<!doctype html>
<html lang="ko" data-role="patient" data-platform="mobile">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="var(--patient-canvas-warm)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>하루안부 · 민지와 대화</title>

  <link rel="icon" type="image/svg+xml" href="../07_디자인/logo/brand-system/01_심볼단독.svg">
  <link rel="stylesheet" href="../07_디자인/tokens/tokens.css">

  <script src="../07_디자인/_app-theme.js"></script>
  <link rel="stylesheet" href="patient.css">
  <script src="../07_디자인/_iconify-icon.min.js"></script>

  <style>
    .main {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: var(--space-4);
      min-height: 0;
    }

    /* ── 대화 상대 헤더 ──────────────────────── */
    .partner {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) var(--space-6);
    }
    .partner .avatar {
      width: 76px; height: 76px; border-radius: 50%;
      overflow: hidden; position: relative;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(var(--color-accent-rgb), 0.25);
    }
    .partner .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .partner .avatar .dot {
      position: absolute; right: 2px; bottom: 2px; z-index: 1;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--brand-green-500); border: 3px solid white;
    }
    .partner .meta { flex: 1; min-width: 0; }
    .partner .name {
      font: var(--weight-bold) 28px / 1.1 var(--font-family-base);
      letter-spacing: -0.3px;
    }
    .partner .status {
      font: var(--weight-medium) 17px / 1.3 var(--font-family-base);
      color: var(--brand-green-600);
      margin-top: 4px;
    }
    .partner .call {
      height: 72px;
      padding: 0 24px;
      border-radius: 20px;
      border: 0; cursor: pointer;
      background: var(--brand-orange-500);
      color: white;
      display: inline-flex; align-items: center; gap: 10px;
      font: var(--weight-bold) 22px / 1 var(--font-family-base);
      letter-spacing: -0.3px;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(var(--color-accent-rgb), 0.35);
      flex-shrink: 0;
      transition: transform .15s;
    }
    .partner .call:active { transform: scale(.97); }

    /* ── 대화 타임라인 — 최근 교환만, 스크롤 없음 ── */
    .thread {
      padding: var(--space-5) var(--space-6);
      display: flex; flex-direction: column;
      justify-content: flex-end;     /* 최근 메시지가 아래에 붙도록 */
      gap: var(--space-4);
      overflow: hidden;
      min-height: 0;
    }

    .day-chip {
      align-self: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--color-text-secondary);
      font: var(--weight-bold) 14px / 1 var(--font-family-base);
      letter-spacing: 0.04em;
    }

    .msg {
      display: flex; gap: 12px;
      max-width: 82%;
    }
    .msg--in { align-self: flex-start; }
    .msg--out {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-av {
      width: 48px; height: 48px; border-radius: 50%;
      overflow: hidden; position: relative;
      flex-shrink: 0;
    }
    .msg-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    .msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .msg-time {
      font: var(--weight-medium) 14px / 1 var(--font-family-base);
      color: var(--color-text-secondary);
      letter-spacing: 0.04em;
    }
    .msg--out .msg-time { text-align: right; }
    .msg-bubble {
      padding: 14px 20px;
      border-radius: 20px;
      font: var(--weight-medium) 22px / 1.4 var(--font-family-base);
      letter-spacing: -0.2px;
    }
    .msg--in .msg-bubble {
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      border-top-left-radius: 6px;
    }
    .msg--out .msg-bubble {
      background: var(--brand-orange-500);
      color: white;
      border-top-right-radius: 6px;
      box-shadow: 0 4px 14px rgba(var(--color-accent-rgb), 0.28);
    }

    .msg-photos {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .msg-photos a {
      display: block; aspect-ratio: 1; border-radius: 14px;
      overflow: hidden;
      background: var(--brand-orange-100);
      text-decoration: none;
    }
    .msg-photos img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── 빠른 답장 칩 ────────────────────────── */
    .quick {
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 0 var(--space-5);
    }
    .chip {
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      font: var(--weight-bold) 20px / 1 var(--font-family-base);
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background .15s, color .15s, transform .15s;
    }
    .chip:hover {
      background: var(--brand-orange-100);
      color: var(--brand-orange-700);
    }
    .chip:active { transform: scale(.96); }

    /* ── 하단 액션 ────────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    .a-btn {
      height: 92px;
      border: 0; cursor: pointer;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font: var(--weight-bold) 24px / 1 var(--font-family-base);
      letter-spacing: -0.3px;
      text-decoration: none;
      transition: transform .15s;
    }
    .a-btn:active { transform: scale(.97); }
    .a-btn--voice {
      background: var(--brand-orange-500);
      color: white;
      box-shadow: 0 10px 28px rgba(var(--color-accent-rgb), 0.38);
    }
    .a-btn--photo {
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 820px) {
      .partner .name { font-size: 22px; }
      .partner .call { height: 60px; font-size: 19px; padding: 0 18px; }
      .msg-bubble { font-size: 19px; padding: 12px 16px; }
      .chip { font-size: 18px; padding: 12px 18px; }
      .a-btn { height: 72px; font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="app">

    <header class="p-header p-header--nav">
      <a href="p03-call.html" class="p-back" aria-label="뒤로">
        <iconify-icon icon="fluent:chevron-left-24-filled" width="28" aria-hidden="true"></iconify-icon>
        뒤로
      </a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a class="nav-tab" href="p01-today.html">
          <iconify-icon icon="fluent:home-24-filled" width="22" aria-hidden="true"></iconify-icon>
          홈
        </a>
        <a class="nav-tab" href="p02-med-alert.html">
          <iconify-icon icon="fluent:clipboard-bullet-list-ltr-24-filled" width="22" aria-hidden="true"></iconify-icon>
          할일
        </a>
        <a class="nav-tab nav-tab--active" href="p03-call.html" aria-current="page">
          <iconify-icon icon="fluent:people-24-filled" width="22" aria-hidden="true"></iconify-icon>
          가족
        </a>
        <a class="nav-tab" href="p08-help.html">
          <iconify-icon icon="fluent:hand-wave-24-filled" width="22" aria-hidden="true"></iconify-icon>
          도움
        </a>
      </nav>
      <div aria-hidden="true"></div>
    </header>

    <div class="main">

      <!-- 대화 상대 헤더 -->
      <section class="partner glass" aria-label="딸 민지와의 대화">
        <div class="avatar">
          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
          <span class="dot" aria-hidden="true"></span>
        </div>
        <div class="meta">
          <div class="name">딸 민지</div>
          <div class="status">지금 접속 중 · 방금 읽음</div>
        </div>
        <a href="p03-call.html" class="call" aria-label="민지에게 영상통화">
          <iconify-icon icon="fluent:video-24-filled" width="26" aria-hidden="true"></iconify-icon>
          전화걸기
        </a>
      </section>

      <!-- 대화 타임라인 (최근 교환만) -->
      <section class="thread glass" aria-label="최근 대화">

        <div class="day-chip">오늘</div>

        <div class="msg msg--in">
          <div class="msg-av"><img src="https://randomuser.me/api/portraits/women/44.jpg" alt=""></div>
          <div class="msg-body">
            <div class="msg-time">오전 9:12</div>
            <div class="msg-bubble">엄마, 오늘 병원 가신다고 하셨죠? 몇 시에 출발하세요?</div>
          </div>
        </div>

        <div class="msg msg--out">
          <div class="msg-av"><img src="https://randomuser.me/api/portraits/women/79.jpg" alt=""></div>
          <div class="msg-body">
            <div class="msg-time">오전 9:15</div>
            <div class="msg-bubble">응 10시쯤 나갈거야. 걱정말어</div>
          </div>
        </div>

        <div class="msg msg--in">
          <div class="msg-av"><img src="https://randomuser.me/api/portraits/women/44.jpg" alt=""></div>
          <div class="msg-body">
            <div class="msg-time">방금 · 사진 2장</div>
            <div class="msg-photos">
              <a href="p06-photo.html" aria-label="사진 크게 보기"><img src="https://picsum.photos/seed/minji-park-spring/520/520" alt="민지가 보낸 공원 사진"></a>
              <a href="p06-photo.html" aria-label="사진 크게 보기"><img src="https://picsum.photos/seed/minji-sooji-smile/520/520" alt="민지가 보낸 손녀 사진"></a>
            </div>
            <div class="msg-bubble">엄마, 오늘 수지랑 공원 다녀왔어요. 날씨가 너무 좋아요!</div>
          </div>
        </div>

      </section>

      <!-- 빠른 답장 -->
      <div class="quick" role="group" aria-label="빠른 답장">
        <button class="chip" type="button">예쁘구나, 잘 다녀왔네</button>
        <button class="chip" type="button">고맙다고 전해줘</button>
        <button class="chip" type="button">나도 보고 싶다</button>
        <button class="chip" type="button">저녁에 전화할게</button>
      </div>

      <!-- 하단 — 음성 답장 / 사진 크게 -->
      <div class="actions">
        <a href="p06-photo.html" class="a-btn a-btn--photo">
          <iconify-icon icon="fluent:image-24-filled" width="28" aria-hidden="true"></iconify-icon>
          사진 크게 보기
        </a>
        <a href="p05-voice.html" class="a-btn a-btn--voice" aria-label="음성으로 답장">
          <iconify-icon icon="fluent:mic-24-filled" width="28" aria-hidden="true"></iconify-icon>
          음성으로 답장
        </a>
      </div>

    </div>
  </div>

</body>
</html>
