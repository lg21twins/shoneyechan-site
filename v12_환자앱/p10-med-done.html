<!doctype html>
<html lang="ko" data-role="patient" data-platform="mobile">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="var(--patient-canvas-warm)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>하루안부 · 약 잘 드셨어요</title>

  <link rel="icon" type="image/svg+xml" href="../07_디자인/logo/brand-system/01_심볼단독.svg">
  <link rel="stylesheet" href="../07_디자인/tokens/tokens.css">

  <script src="../07_디자인/_app-theme.js"></script>
  <link rel="stylesheet" href="patient.css">
  <script src="../07_디자인/_iconify-icon.min.js"></script>

  <style>
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--space-6);
      min-height: 0;
    }

    /* ── 완료 배지 ────────────────────────────── */
    .done-hero {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-3);
      margin-top: 0;
    }
    .done-mark {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: var(--brand-orange-500);
      display: flex; align-items: center; justify-content: center;
      color: white;
      box-shadow: 0 14px 36px rgba(var(--color-accent-rgb), 0.38);
      flex-shrink: 0;
      animation: done-pop .5s cubic-bezier(.2, .9, .3, 1.4) both;
    }
    .done-mark iconify-icon { font-size: 74px; }
    @keyframes done-pop {
      0%   { transform: scale(.4); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .done-heading h1 {
      font: var(--weight-bold) 38px / 1.1 var(--font-family-base);
      letter-spacing: -0.04em;
      text-align: center;
    }
    .done-heading p {
      font: var(--weight-medium) 19px / 1.4 var(--font-family-base);
      color: var(--color-text-secondary);
      text-align: center;
      margin-top: 8px;
    }

    /* ── 두 장의 카드: 방금 드신 약 / 다음 약 ─── */
    .cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--space-5);
      width: 100%; max-width: 900px;
      flex: 1; min-height: 0;
    }

    .info-card {
      padding: var(--space-6) var(--space-6);
      display: flex; flex-direction: column; gap: var(--space-3);
      overflow: hidden;
      min-height: 0;
    }
    .info-card .label {
      font: var(--weight-bold) 16px / 1 var(--font-family-base);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .info-card .title {
      font: var(--weight-bold) 28px / 1.1 var(--font-family-base);
      letter-spacing: -0.3px;
    }
    .info-card .title em {
      font-style: normal;
      color: var(--brand-orange-600);
    }
    .info-card ul {
      list-style: none;
      display: flex; flex-direction: column; gap: 10px;
      margin-top: 6px;
    }
    .info-card li {
      display: flex; align-items: center; gap: 14px;
      font: var(--weight-medium) 21px / 1.3 var(--font-family-base);
      letter-spacing: -0.2px;
      padding: 10px 0;
    }
    .info-card li .med-dot {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0;
      background: var(--brand-orange-400);
    }
    .info-card.done-list li .med-dot { background: var(--brand-green-500); }

    .info-card .next-time {
      font: var(--weight-bold) 40px / 1 var(--font-family-base);
      letter-spacing: -0.04em;
      color: var(--brand-orange-600);
      margin-top: 6px;
    }
    .info-card .next-time .sub {
      display: block;
      font: var(--weight-medium) 17px / 1 var(--font-family-base);
      color: var(--color-text-secondary);
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── 가족 알림 안내 ──────────────────────── */
    .notify {
      width: 100%; max-width: 900px;
      padding: var(--space-4) var(--space-6);
      display: flex; align-items: center; gap: var(--space-4);
      border-radius: 20px;
      background: rgba(var(--color-accent-rgb), 0.08);
    }
    .notify .avatars {
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .notify .avatars .av {
      width: 48px; height: 48px;
      border-radius: 50%; overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      position: relative;
    }
    .notify .avatars .av + .av { margin-left: -14px; }
    .notify .avatars img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .notify .text {
      font: var(--weight-medium) 19px / 1.4 var(--font-family-base);
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
    }
    .notify .text b {
      font-weight: 700;
      color: var(--brand-orange-700);
    }

    /* ── 홈으로 큰 버튼 ─────────────────────── */
    .home-btn {
      width: 100%; max-width: 900px;
      height: 96px;
      border-radius: 24px;
      border: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      font: var(--weight-bold) 26px / 1 var(--font-family-base);
      letter-spacing: -0.3px;
      background: var(--brand-orange-500);
      color: white;
      box-shadow: 0 10px 30px rgba(var(--color-accent-rgb), 0.38);
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }
    .home-btn:active { transform: scale(.97); }

    @media (max-width: 820px) {
      .done-mark { width: 120px; height: 120px; }
      .done-mark iconify-icon { font-size: 68px; }
      .done-heading h1 { font-size: 34px; }
      .done-heading p { font-size: 18px; }
      .cards { grid-template-columns: 1fr; }
      .info-card .title { font-size: 22px; }
      .info-card li { font-size: 18px; }
      .info-card .next-time { font-size: 32px; }
      .home-btn { height: 80px; font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="app">

    <header class="p-header p-header--nav">
      <a href="p02-med-alert.html" class="p-back" aria-label="뒤로">
        <iconify-icon icon="fluent:chevron-left-24-filled" width="28" aria-hidden="true"></iconify-icon>
        뒤로
      </a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a class="nav-tab" href="p01-today.html">
          <iconify-icon icon="fluent:home-24-filled" width="22" aria-hidden="true"></iconify-icon>
          홈
        </a>
        <a class="nav-tab nav-tab--active" href="p02-med-alert.html" aria-current="page">
          <iconify-icon icon="fluent:clipboard-bullet-list-ltr-24-filled" width="22" aria-hidden="true"></iconify-icon>
          할일
        </a>
        <a class="nav-tab" href="p03-call.html">
          <iconify-icon icon="fluent:people-24-filled" width="22" aria-hidden="true"></iconify-icon>
          가족
        </a>
        <a class="nav-tab" href="p08-help.html">
          <iconify-icon icon="fluent:hand-wave-24-filled" width="22" aria-hidden="true"></iconify-icon>
          도움
        </a>
      </nav>
      <div aria-hidden="true"></div>
    </header>

    <div class="main">

      <div class="done-hero">
        <div class="done-mark" aria-hidden="true">
          <iconify-icon icon="fluent:checkmark-24-filled"></iconify-icon>
        </div>
        <div class="done-heading">
          <h1>약 잘 드셨어요</h1>
          <p>점심 약 3가지 모두 확인했어요. 수고하셨습니다.</p>
        </div>
      </div>

      <div class="cards">

        <article class="info-card glass done-list" aria-label="방금 드신 약">
          <div class="label">방금 드신 약</div>
          <div class="title"><em>3가지</em> · 오후 2:30</div>
          <ul>
            <li><span class="med-dot" aria-hidden="true"></span>혈압약</li>
            <li><span class="med-dot" aria-hidden="true"></span>당뇨약</li>
            <li><span class="med-dot" aria-hidden="true"></span>비타민 D</li>
          </ul>
        </article>

        <article class="info-card glass" aria-label="다음 약">
          <div class="label">다음 약</div>
          <div class="title">저녁 약</div>
          <div class="next-time">
            오후 6:00
            <span class="sub">3시간 30분 뒤</span>
          </div>
          <ul>
            <li><span class="med-dot" aria-hidden="true"></span>혈압약</li>
            <li><span class="med-dot" aria-hidden="true"></span>당뇨약</li>
          </ul>
        </article>

      </div>

      <div class="notify" role="status" aria-live="polite">
        <div class="avatars" aria-hidden="true">
          <div class="av"><img src="https://randomuser.me/api/portraits/women/44.jpg" alt=""></div>
          <div class="av"><img src="https://randomuser.me/api/portraits/women/9.jpg" alt=""></div>
          <div class="av"><img src="https://randomuser.me/api/portraits/men/32.jpg" alt=""></div>
        </div>
        <div class="text">
          <b>민지 · 서연 · 태우</b>에게 "약 드셨어요" 소식을 자동으로 전해드렸어요.
        </div>
      </div>

      <a href="p01-today.html" class="home-btn" aria-label="오늘 홈으로 돌아가기">
        <iconify-icon icon="fluent:home-24-filled" width="32" aria-hidden="true"></iconify-icon>
        오늘 홈으로
      </a>

    </div>
  </div>

</body>
</html>
