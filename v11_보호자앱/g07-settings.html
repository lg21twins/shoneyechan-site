<script>
  function toggleSwitch(btn){
    var on = btn.classList.toggle('is-on');
    btn.setAttribute('aria-checked', on ? 'true' : 'false');
  }

  // ---- v3.2.3 화면 설정 토글 바인딩 (다크는 봉인, 글자크게·고대비만) ----
  (function () {
    const T = window.HaruTheme;
    if (!T) return;

    function syncToggle(btn, on) {
      btn.classList.toggle('is-on', on);
      btn.setAttribute('aria-checked', on ? 'true' : 'false');
    }

    const text     = document.getElementById('toggle-text');
    const contrast = document.getElementById('toggle-contrast');

    syncToggle(text, T.getTextSize() === 'large');
    syncToggle(contrast, T.getContrast() === 'high');

    text.addEventListener('click', () => {
      const next = !text.classList.contains('is-on');
      T.setTextSize(next ? 'large' : 'normal');
      syncToggle(text, next);
    });

    contrast.addEventListener('click', () => {
      const next = !contrast.classList.contains('is-on');
      T.setContrast(next ? 'high' : 'normal');
      syncToggle(contrast, next);
    });
  })();
</script>
