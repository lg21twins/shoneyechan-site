<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간호사 아바타 아이콘 후보</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,sans-serif;background:#f5f5f7;padding:20px;max-width:420px;margin:0 auto}
  h1{font-size:18px;font-weight:800;text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:#888;font-size:12px;margin-bottom:24px}
  h2{font-size:14px;font-weight:700;margin:20px 0 8px;color:#2C7AFC}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .c{width:90px;background:#fff;border-radius:14px;padding:16px 6px;display:flex;flex-direction:column;align-items:center;gap:8px;border:1px solid rgba(0,0,0,.04)}
  .av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#2C7AFC,#5B9BFF);display:flex;align-items:center;justify-content:center}
  .av iconify-icon{font-size:24px;color:#fff}
  .c span{font-size:10px;color:#666;text-align:center;line-height:1.3}
  .note{background:rgba(44,122,252,.06);border:1px solid rgba(44,122,252,.1);border-radius:10px;padding:12px;font-size:11px;color:#2C7AFC;margin:16px 0;line-height:1.5}
</style>
</head>
<body>
<h1>간호사 아바타 아이콘 후보</h1>
<p class="sub">채팅 목록 / 헤더에 쓸 간호사 아이콘 — 골라줘</p>

<div class="note">현재 stethoscope 쓰고있는데, 간호사마다 다르게 할지 통일할지도 골라줘</div>

<h2>의료 관련</h2>
<div class="row">
  <div class="c"><div class="av"><iconify-icon icon="fluent:stethoscope-24-filled"></iconify-icon></div><span>청진기<br>(현재)</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:person-24-filled"></iconify-icon></div><span>사람</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:doctor-24-filled"></iconify-icon></div><span>의사</span></div>
  <div class="c"><div class="av"><iconify-icon icon="ph:nurse-fill"></iconify-icon></div><span>간호사(ph)</span></div>
</div>

<h2>사람 관련</h2>
<div class="row">
  <div class="c"><div class="av"><iconify-icon icon="fluent:person-heart-24-filled"></iconify-icon></div><span>사람+하트</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:person-star-24-filled"></iconify-icon></div><span>사람+별</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:person-tag-24-filled"></iconify-icon></div><span>사람+태그</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:person-available-24-filled"></iconify-icon></div><span>사람+체크</span></div>
</div>

<h2>케어 관련</h2>
<div class="row">
  <div class="c"><div class="av"><iconify-icon icon="fluent:heart-pulse-24-filled"></iconify-icon></div><span>하트펄스</span></div>
  <div class="c"><div class="av"><iconify-icon icon="ph:heartbeat-fill"></iconify-icon></div><span>심박</span></div>
  <div class="c"><div class="av"><iconify-icon icon="fluent:clipboard-task-list-ltr-24-filled"></iconify-icon></div><span>클립보드</span></div>
  <div class="c"><div class="av"><iconify-icon icon="material-symbols:medical-services-rounded"></iconify-icon></div><span>의료가방</span></div>
</div>

<h2>이니셜 스타일 (텍스트)</h2>
<div class="row">
  <div class="c"><div class="av" style="font-size:18px;font-weight:800;color:#fff">김</div><span>성 이니셜</span></div>
  <div class="c"><div class="av" style="font-size:14px;font-weight:700;color:#fff">미영</div><span>이름</span></div>
  <div class="c"><div class="av" style="font-size:14px;font-weight:700;color:#fff">RN</div><span>간호사 영문</span></div>
</div>

</body>
</html>
