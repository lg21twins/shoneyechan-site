<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이페이지 아이콘 후보</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,sans-serif;background:#f5f5f7;padding:20px;max-width:400px;margin:0 auto}
  h1{font-size:18px;font-weight:800;text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:#888;font-size:12px;margin-bottom:24px}
  h2{font-size:14px;font-weight:700;margin:20px 0 8px;color:#2C7AFC}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .c{width:72px;background:#fff;border-radius:12px;padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid rgba(0,0,0,.04)}
  .c iconify-icon{font-size:24px;color:#1c1c1e}
  .c span{font-size:9px;color:#999;text-align:center}
</style>
</head>
<body>
<h1>마이페이지 아이콘 후보</h1>
<p class="sub">각 카테고리에서 골라줘 — 이미 정한 건 ✓ 표시</p>

<h2>프로필 관련</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:person-24-filled"></iconify-icon><span>프로필 ✓</span></div>
  <div class="c"><iconify-icon icon="fluent:edit-24-filled"></iconify-icon><span>편집</span></div>
  <div class="c"><iconify-icon icon="fluent:person-edit-24-filled"></iconify-icon><span>프로필수정</span></div>
  <div class="c"><iconify-icon icon="fluent:camera-24-filled"></iconify-icon><span>카메라</span></div>
</div>

<h2>계정 메뉴</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:alert-24-filled"></iconify-icon><span>알림 ✓</span></div>
  <div class="c"><iconify-icon icon="fluent:settings-24-filled"></iconify-icon><span>설정 ✓</span></div>
  <div class="c"><iconify-icon icon="fluent:shield-24-filled"></iconify-icon><span>보안</span></div>
  <div class="c"><iconify-icon icon="fluent:lock-closed-24-filled"></iconify-icon><span>잠금</span></div>
  <div class="c"><iconify-icon icon="fluent:key-24-filled"></iconify-icon><span>키</span></div>
</div>

<h2>서비스 메뉴</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:payment-24-filled"></iconify-icon><span>결제</span></div>
  <div class="c"><iconify-icon icon="fluent:credit-card-person-24-filled"></iconify-icon><span>구독</span></div>
  <div class="c"><iconify-icon icon="fluent:wallet-24-filled"></iconify-icon><span>지갑</span></div>
  <div class="c"><iconify-icon icon="tabler:pill-filled"></iconify-icon><span>처방 ✓</span></div>
  <div class="c"><iconify-icon icon="fluent:clipboard-task-list-ltr-24-filled"></iconify-icon><span>처방목록</span></div>
</div>

<h2>AI 관련</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:bot-24-filled"></iconify-icon><span>AI봇</span></div>
  <div class="c"><iconify-icon icon="fluent:sparkle-24-filled"></iconify-icon><span>스파클</span></div>
  <div class="c"><iconify-icon icon="fluent:brain-circuit-24-filled"></iconify-icon><span>AI두뇌</span></div>
</div>

<h2>지원/기타</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:question-circle-24-filled"></iconify-icon><span>도움말</span></div>
  <div class="c"><iconify-icon icon="fluent:chat-help-24-filled"></iconify-icon><span>고객센터</span></div>
  <div class="c"><iconify-icon icon="fluent:info-24-filled"></iconify-icon><span>정보</span></div>
  <div class="c"><iconify-icon icon="fluent:sign-out-24-filled"></iconify-icon><span>로그아웃</span></div>
  <div class="c"><iconify-icon icon="fluent:document-24-filled"></iconify-icon><span>문서</span></div>
  <div class="c"><iconify-icon icon="fluent:book-24-filled"></iconify-icon><span>가이드</span></div>
</div>

<h2>케어 대상 카드</h2>
<div class="row">
  <div class="c"><iconify-icon icon="fluent:building-24-filled"></iconify-icon><span>시설</span></div>
  <div class="c"><iconify-icon icon="fluent:door-24-filled"></iconify-icon><span>호실</span></div>
  <div class="c"><iconify-icon icon="ph:heartbeat-fill"></iconify-icon><span>심박 ✓</span></div>
  <div class="c"><iconify-icon icon="fluent:stethoscope-24-filled"></iconify-icon><span>진단</span></div>
  <div class="c"><iconify-icon icon="fluent:calendar-24-filled"></iconify-icon><span>캘린더 ✓</span></div>
</div>

</body>
</html>
