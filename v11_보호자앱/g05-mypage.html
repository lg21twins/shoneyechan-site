  <style>
    .app-shell { max-width: 430px; margin: 0 auto; }
    /* card elevation 통일 — clinical과 동일 floating shadow */
    .card { box-shadow: var(--shadow-card-floating) !important; border: 0 !important; }

    /* 프로필 카드 — 옵션 D · Compact horizontal */
    .profile {animation:haru-fade-in-up var(--duration-slow,350ms) var(--easing-standard) both;
      display: flex; align-items: center; gap: var(--space-4);
    }
    .profile__av {
      width: 68px; height: 68px; border-radius: var(--radius-pill);
      overflow: hidden; flex-shrink: 0;
      border: 2px solid var(--color-accent-soft);
    }
    .profile__av img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .profile__body { flex: 1; min-width: 0; }
    .profile__name { font-size: var(--font-20); font-weight: var(--weight-bold); }
    .profile__sub { font-size: var(--text-caption); color: var(--color-text-secondary); margin-top: 2px; }

    .pills { display: flex; gap: var(--space-2); margin-top: var(--space-3); flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: var(--radius-pill);
      background: var(--color-bg-canvas);
      font-size: var(--text-mini); font-weight: var(--weight-bold);
      color: var(--color-text-secondary);
    }
    .pill iconify-icon { font-size: 12px; }
    .pill--accent {
      background: var(--color-accent-soft);
      color: var(--color-accent);
    }

    .qr-btn {
      width: 36px; height: 36px; border-radius: var(--radius-pill);
      display: flex; align-items: center; justify-content: center;
      background: var(--color-bg-canvas); flex-shrink: 0;
      border: 0; cursor: pointer; color: var(--color-text-secondary);
    }
    .qr-btn:active { transform: scale(0.94); }
    .qr-btn iconify-icon { font-size: 18px; }

    /* 케어 대상 카드 */
    .care-top { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-4); }
    .care-av {
      width: 48px; height: 48px; border-radius: var(--radius-pill);
      background: var(--color-accent-soft);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .care-av img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .care-av__dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: var(--radius-pill);
      background: var(--color-success);
      border: 2px solid var(--color-bg-surface);
    }
    .care-name { font-size: var(--font-16); font-weight: var(--weight-bold); }
    .care-sub  { font-size: var(--text-caption); color: var(--color-text-secondary); margin-top: 1px; }
    .care-rows { display: flex; flex-direction: column; }
    .care-row {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) 0;
      border-top: 1px solid var(--color-border-subtle);
    }
    .care-row:first-child { border-top: 0; }
    .care-row__icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: var(--color-accent-soft);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .care-row__icon iconify-icon { font-size: 16px; color: var(--color-accent); }
    .care-row__label { font-size: var(--text-mini); color: var(--color-text-secondary); }
    .care-row__val   { font-size: var(--text-callout); font-weight: var(--weight-semibold); }

    /* 빠른 액션 — 가족/결제/알림/설정 (탭바와 중복 없음) */
    .quick-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3);
    }
    .quick-btn {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
      padding: var(--space-5) var(--space-3);
      background: var(--color-bg-surface);
      border: 0;
      border-radius: var(--radius-card);
      cursor: pointer; text-decoration: none; color: inherit;
      transition: var(--motion-micro) var(--easing-standard);
      box-shadow: var(--shadow-card-floating);
    }
    .quick-btn:active { transform: scale(0.97); }
    .quick-icon {
      width: 40px; height: 40px; border-radius: var(--radius-pill);
      background: var(--color-accent-soft);
      display: flex; align-items: center; justify-content: center;
    }
    .quick-icon iconify-icon { font-size: 20px; color: var(--color-accent); }
    .quick-label { font-size: var(--text-mini); font-weight: var(--weight-semibold); }

    /* 메뉴 그룹 */
    .menu-title {
      font-size: var(--text-mini); font-weight: var(--weight-bold);
      color: var(--color-text-secondary);
      letter-spacing: 0.2px;
      padding: 0 var(--space-1);
      margin: var(--space-7) 0 var(--space-3);
    }
    .menu-group { background: var(--color-bg-surface); border-radius: var(--radius-card); padding: 0; overflow: hidden; }
    .menu-item {
      display: flex; align-items: center; gap: var(--space-4);
      padding: 16px 18px;
      text-decoration: none; color: inherit;
      transition: background var(--motion-micro) var(--easing-standard);
    }
    .menu-item:active { background: var(--color-bg-canvas); }
    .menu-item + .menu-item { border-top: 1px solid var(--color-border-subtle); }
    .mi-icon {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--color-accent-soft);
    }
    .mi-icon iconify-icon { font-size: 16px; color: var(--color-accent); }
    .mi-icon--success { background: var(--color-success-soft); }
    .mi-icon--success iconify-icon { color: var(--color-success); }
    .mi-icon--warning { background: var(--color-warning-soft); }
    .mi-icon--warning iconify-icon { color: var(--palette-amber-700); }
    .mi-body { flex: 1; }
    .mi-label { font-size: var(--text-callout); font-weight: var(--weight-semibold); }
    .mi-desc  { font-size: var(--text-mini); color: var(--color-text-secondary); margin-top: 1px; }
    .mi-right { display: flex; align-items: center; gap: var(--space-3); color: var(--color-text-tertiary); }
    .mi-badge {
      min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: var(--radius-pill);
      background: var(--color-danger);
      color: var(--color-text-on-dark);
      font-size: 10px; font-weight: var(--weight-bold);
      display: flex; align-items: center; justify-content: center;
    }

    /* logout — 3앱 통일 (clinical mypage 표준: red text, no border, subtle shadow) */
    .logout {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 15px;
      font-size: 13.5px; font-weight: 600; font-family: inherit;
      color: var(--palette-red-600);
      background: var(--color-bg-surface);
      border: 0;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      margin-top: var(--space-5);
      cursor: pointer; text-decoration: none;
    }
    /* version — clinical mypage 표준과 동일 (12px / 500 / t3 / 18px margin) */
    .version {
      text-align: center;
      font-size: 12px; font-weight: 500;
      color: var(--color-text-tertiary);
      margin-top: 18px;
    }
  </style>
