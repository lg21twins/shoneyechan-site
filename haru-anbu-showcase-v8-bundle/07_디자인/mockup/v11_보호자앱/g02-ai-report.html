<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d4e4ff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 기록</title>
  <link rel="stylesheet" href="common.css">
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
  <style>
    :root {
      --blue:#2C7AFC;--blue-l:#5B9BFF;--blue-d:#1D6AF2;
      --green:#34D399;--green-d:#059669;
      --amber:#F59E0B;--red:#EF4444;
      --t1:#111827;--t2:rgba(0,0,0,.5);--t3:rgba(0,0,0,.35);
    }
    html { background:#d4e4ff; overscroll-behavior:none; }
    body {
      background:transparent; max-width:430px; margin:0 auto; min-height:100vh;
      padding-bottom:calc(max(env(safe-area-inset-bottom,0px),20px) + 24px + 68px + 16px);
      font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
      -webkit-font-smoothing:antialiased; color:var(--t1);
      overscroll-behavior:none;
    }
    .content { padding:0 16px; position:relative; z-index:1; }

    /* ═══ 배경 블롭 ═══ */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(180deg,#d4e4ff 0%,#e8f0fe 40%,#f2f6ff 70%,#EEF3FB 100%);pointer-events:none}
    .bg-logo{position:absolute;width:140%;height:auto;left:50%;top:42%;transform:translate(-50%,-50%);opacity:.06;filter:blur(32px);animation:bgl 8s ease-in-out infinite}
    @keyframes bgl{0%,100%{transform:translate(-50%,-50%)scale(1);opacity:.05}50%{transform:translate(-50%,-50%)scale(1.06)rotate(1.5deg);opacity:.08}}
    .bg .g1{position:absolute;width:500px;height:500px;left:50%;top:-5%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,rgba(44,122,252,.18)0%,transparent 65%);filter:blur(30px);animation:ga 8s ease-in-out infinite alternate}
    .bg .g2{position:absolute;width:600px;height:400px;left:50%;top:35%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(200,220,255,.25)0%,transparent 65%);filter:blur(40px);animation:gb 10s ease-in-out infinite alternate}
    .bg .g3{position:absolute;width:700px;height:500px;left:50%;bottom:-15%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(44,122,252,.08)0%,transparent 70%);filter:blur(35px);animation:gc 12s ease-in-out infinite alternate}
    @keyframes ga{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.08)translateY(12px)}}
    @keyframes gb{0%{transform:translate(-50%,-50%)scale(1)}100%{transform:translate(-52%,-48%)scale(1.05)}}
    @keyframes gc{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.06)translateY(-8px)}}

    /* ═══ 헤더 — 표준 ═══ */
    .header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 8px) 20px 10px;background:rgba(212,228,255,.85);transition:background .3s}
    .header.scrolled{background:rgba(255,255,255,.86)}
    .header-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
    .header-left,.header-right{width:36px;display:flex;align-items:center}
    .header-right{justify-content:flex-end}
    .nav-btn,.btn-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:transform .1s;color:var(--t1)}
    .nav-btn:active,.btn-icon:active{transform:scale(.93)}
    .nav-btn iconify-icon,.btn-icon iconify-icon{font-size:18px;color:var(--blue)}

    /* ═══ 섹션 간격 ═══ */
    .zone { margin-bottom:20px; }
    .zone-title {
      font-size:17px;font-weight:700;letter-spacing:-.3px;
      margin-bottom:12px;padding:0 4px;
    }

    /* ═══ AI 요약바 ═══ */
    .ai-bar {
      display:flex;align-items:center;gap:16px;padding:20px;border-radius:20px;
      background:rgba(255,255,255,.75);backdrop-filter:blur(20px);
      border:1px solid rgba(0,0,0,.04);
      position:relative;overflow:hidden;
    }
    .ai-bar::before {
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(148deg,rgba(255,255,255,.40) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }
    .ai-score{position:relative;flex-shrink:0;width:60px;height:60px;display:flex;align-items:center;justify-content:center}
    .ai-score-num{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-1px;line-height:1}
    .ai-right{flex:1;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1}
    .ai-label{font-size:10px;font-weight:800;color:var(--blue);letter-spacing:.3px}
    .ai-text{font-size:14px;font-weight:600;line-height:1.4}

    /* ═══ 벤토 그리드 ═══ */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-full{grid-column:1/-1}

    /* ═══ 위젯 카드 베이스 ═══ */
    .w {
      background:rgba(255,255,255,.75);backdrop-filter:blur(20px);
      border:1px solid rgba(0,0,0,.04);border-radius:20px;
      padding:18px;cursor:pointer;
      transition:transform .12s;position:relative;overflow:hidden;
    }
    .w::before {
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(148deg,rgba(255,255,255,.40) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }
    .w:active{transform:scale(.97)}
    .w-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:1}
    .w-title{font-size:16px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
    .w-title iconify-icon{font-size:18px}
    .w-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}

    /* ═══ 투약 위젯 ═══ */
    .pill-dots{display:flex;gap:8px;margin-top:8px}
    .pill-dot{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--t2)}
    .pill-dot-circle{width:8px;height:8px;border-radius:50%}

    /* ═══ 식사 위젯 ═══ */
    .meal-bars{display:flex;flex-direction:column;gap:6px;margin-top:6px}
    .meal-bar-row{display:flex;align-items:center;gap:8px}
    .meal-bar-label{font-size:11px;font-weight:600;width:24px;flex-shrink:0}
    .meal-bar-bg{flex:1;height:5px;background:rgba(0,0,0,.04);border-radius:3px;overflow:hidden}
    .meal-bar-fill{height:100%;border-radius:3px}

    /* ═══ 기분+활동 결합 카드 ═══ */
    .combined-inner{display:flex;gap:16px;position:relative;z-index:1}
    .combined-half{flex:1;text-align:center}
    .combined-divider{width:1px;background:rgba(0,0,0,.06);margin:0 0}
    .combined-metric{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
    .combined-unit{font-size:12px;font-weight:500;color:var(--t3)}
    .combined-sub{font-size:11px;color:var(--t3);margin-top:4px}

    /* ═══ 위생 체크리스트 ═══ */
    .chk-row{display:flex;align-items:center;gap:8px;padding:5px 0;position:relative;z-index:1}
    .chk-box{width:16px;height:16px;border-radius:5px;border:2px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
    .chk-box.done{background:var(--blue);border-color:var(--blue);color:#fff}
    .chk-name{font-size:12px;font-weight:600;flex:1}
    .chk-time{font-size:10px;color:var(--t3)}

    /* ═══ 특이사항 위젯 ═══ */
    .note-widget {
      background:rgba(245,158,11,.07) !important;
      border:0.5px solid rgba(245,158,11,.2) !important;
    }
    .note-widget::before {
      background:linear-gradient(148deg,rgba(245,158,11,.08) 0%,transparent 50%) !important;
    }
    .note-widget .w-title{color:#92400E}
    .note-text{font-size:13px;color:#78350F;line-height:1.45;position:relative;z-index:1}

    /* ═══ 담당 간호사 카드 ═══ */
    .nurse-card{padding:0 !important}
    .nurse-img{width:100%;height:120px;overflow:hidden;border-radius:20px 20px 0 0;position:relative}
    .nurse-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
    .nurse-img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#DBEAFE,#93C5FD);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:var(--blue-d)}
    .nurse-body{padding:14px 16px;text-align:center;position:relative;z-index:1}
    .nurse-name{font-size:15px;font-weight:800}
    .nurse-sub{font-size:11px;color:var(--t3);margin-top:2px}
    .nurse-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;color:var(--green-d);background:rgba(52,211,153,.12);margin-top:6px}
    .nurse-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}
    .nurse-btn{width:100%;margin-top:10px;padding:10px;border-radius:12px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer}
    .nurse-btn:active{opacity:.85}

    /* ═══ ZONE C: 의료 기록 카드 ═══ */
    .record-card {
      background:rgba(255,255,255,.72);backdrop-filter:blur(56px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter:blur(56px) saturate(180%) brightness(1.06);
      border:0.5px solid rgba(255,255,255,.70);border-radius:20px;
      padding:18px;cursor:pointer;
      box-shadow:0 1px 0 rgba(255,255,255,.80) inset,0 6px 20px rgba(0,0,0,.09);
      position:relative;overflow:hidden;transition:transform .12s;
    }
    .record-card::before {
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 55%);
      pointer-events:none;z-index:0;
    }
    .record-card:active{transform:scale(.97)}
    .record-card + .record-card{margin-top:10px}
    .rc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;z-index:1}
    .rc-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rc-title{font-size:15px;font-weight:700;flex:1}
    .rc-count{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(44,122,252,.1);color:var(--blue)}
    .rc-arrow{font-size:16px;color:var(--t3)}

    /* 처방약 행 */
    .med-row {
      display:flex;align-items:center;gap:10px;
      padding:8px 12px;border-radius:12px;
      background:rgba(255,255,255,.22);border:0.5px solid rgba(255,255,255,.45);
      margin-bottom:6px;position:relative;z-index:1;
    }
    .med-row:last-child{margin-bottom:0}
    .med-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .med-name-short{font-size:13px;font-weight:600;flex:1}
    .med-info{font-size:11px;color:var(--t2)}
    .rc-footer{font-size:11px;color:var(--t3);margin-top:10px;position:relative;z-index:1}

    /* 타임라인 미리보기 행 */
    .tl-preview{position:relative;z-index:1}
    .tl-pv-item{display:flex;align-items:center;gap:10px;padding:8px 0}
    .tl-pv-item+.tl-pv-item{border-top:0.5px solid rgba(0,0,0,.04)}
    .tl-pv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .tl-pv-date{font-size:11px;font-weight:600;color:var(--t3);width:32px;flex-shrink:0}
    .tl-pv-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0}
    .tl-pv-text{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rc-link{display:block;font-size:12px;font-weight:600;color:var(--blue);margin-top:10px;text-align:right;position:relative;z-index:1}

    /* ═══ 주간 트렌드 ═══ */
    .trend-row{display:flex;align-items:flex-end;gap:6px;height:48px;margin-top:10px}
    .trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
    .trend-bar-bg{width:100%;height:40px;background:rgba(0,0,0,.03);border-radius:4px;position:relative;overflow:hidden}
    .trend-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px}
    .trend-day{font-size:9px;color:var(--t3);font-weight:500}

    /* ═══ CTA ═══ */
    .cta-row{display:flex;gap:8px;margin-top:4px}
    .cta-btn {
      flex:1;padding:14px;border-radius:16px;text-align:center;
      font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:transform .12s;border:none;
    }
    .cta-btn:active{transform:scale(.97)}
    .cta-secondary {
      background:rgba(255,255,255,.72);backdrop-filter:blur(40px);
      border:0.5px solid rgba(255,255,255,.80);color:var(--t1);
    }
    .cta-primary {
      background:rgba(44,122,252,.12);backdrop-filter:blur(40px);
      border:0.5px solid rgba(44,122,252,.25);color:var(--blue);
    }

    /* ═══ 바텀시트 ═══ */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;z-index:200}
    .overlay.show{display:flex}
    .sheet{background:rgba(255,255,255,.94);backdrop-filter:blur(40px);border-radius:28px 28px 0 0;padding:20px 24px calc(32px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;max-height:70vh;overflow-y:auto}
    .sheet-handle{width:36px;height:4px;background:rgba(0,0,0,.08);border-radius:2px;margin:0 auto 20px}
    .sheet-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .sheet-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center}
    .sheet-icon iconify-icon{font-size:22px;color:#fff}
    .sheet-ttl{font-size:20px;font-weight:800}
    .sheet-sub{font-size:13px;color:var(--t3)}
    .srow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;background:rgba(0,0,0,.025);margin-bottom:8px}
    .srow-icon{width:36px;height:36px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center}
    .srow-icon iconify-icon{font-size:18px}
    .srow-text{flex:1}
    .srow-label{font-size:12px;color:var(--t3)}
    .srow-val{font-size:15px;font-weight:600;margin-top:1px}
    .srow-badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}

    /* ═══ 탭바 ═══ */
    .tabbar{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%);width:calc(100% - 80px);max-width:320px;height:68px;background:rgba(180,210,250,.15);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.35);border-radius:999px;box-shadow:0 4px 20px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.3);display:flex;align-items:stretch;justify-content:space-around;padding:0 10px;z-index:40}
    .tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;padding:8px 4px;border-radius:999px;color:rgba(28,28,30,.45);text-decoration:none;transition:all .18s}
    .tab.active{color:#2C7AFC}
    .tab-icon{display:flex;align-items:center}
    .tab-icon svg{width:26px;height:26px;fill:currentColor}
  </style>
</head>
<body>

  <!-- 배경 애니메이션 블롭 -->
  <div class="bg"><svg class="bg-logo" viewBox="0 0 2526 2526" fill="none"><path d="M2521.32 2506.66C1239.65 2657.48 1239.65 1895.6 1239.65 1279.34L2497.69 .00017C2518.68 494.198 2522.27 1157.92 1658.86 1262.48 2641.88 1314.25 2521.32 2101.84 2521.32 2506.66Z" fill="#2C7AFC"/><path d="M4.677 19.335C1286.35-131.481 1286.35 630.399 1286.35 1246.66L28.315 2526C7.322 2031.8 3.73 1368.08 867.143 1263.52-115.881 1211.75 4.677 424.157 4.677 19.335Z" fill="#2C7AFC"/></svg><div class="g1"></div><div class="g2"></div><div class="g3"></div></div>

  <!-- 헤더 — 표준 -->
  <div class="header" id="header">
    <div class="header-left"><a href="g-guardian-live.html" class="btn-icon" aria-label="뒤로 가기"><iconify-icon icon="fluent:chevron-left-24-filled"></iconify-icon></a></div>
    <span class="header-title">일일 리포트</span>
    <div class="header-right"></div>
  </div>

  <div class="content">

    <!-- ══ ZONE A: 날짜 선택 + AI 요약 ══ -->
    <div class="zone">
      <div class="ai-bar">
        <div class="ai-score">
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="25" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="5"/>
            <circle cx="30" cy="30" r="25" fill="none" stroke="var(--blue)" stroke-width="5" stroke-linecap="round" stroke-dasharray="118 157" transform="rotate(-90 30 30)"/>
          </svg>
          <div style="position:absolute;text-align:center">
            <div class="ai-score-num">75</div>
          </div>
        </div>
        <div class="ai-right">
          <div class="ai-label">AI 케어 분석</div>
          <div class="ai-text">투약 3회 완료, 식사 양호<br>점심 섭취량 소폭 감소 — 경과 관찰</div>
        </div>
      </div>
    </div>

    <!-- ══ ZONE B: 오늘의 케어 벤토 그리드 ══ -->
    <div class="zone">
      <div class="zone-title">오늘의 케어</div>
      <div class="grid">

        <!-- 투약 -->
        <div class="w" onclick="openSheet('pill')">
          <div class="w-head">
            <div class="w-title"><iconify-icon icon="tabler:pill-filled" style="color:#6EE7B7"></iconify-icon>투약</div>
            <div class="w-badge" style="color:var(--green-d);background:rgba(52,211,153,.12)">완료</div>
          </div>
          <div style="position:relative;z-index:1">
            <div style="font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1">3<span style="font-size:16px;font-weight:600;color:var(--t3)">/3</span></div>
            <div class="pill-dots">
              <div class="pill-dot"><div class="pill-dot-circle" style="background:var(--green)"></div>아침</div>
              <div class="pill-dot"><div class="pill-dot-circle" style="background:var(--green)"></div>점심</div>
              <div class="pill-dot"><div class="pill-dot-circle" style="background:var(--green)"></div>오후</div>
            </div>
          </div>
        </div>

        <!-- 식사 -->
        <div class="w" onclick="openSheet('food')">
          <div class="w-head">
            <div class="w-title"><iconify-icon icon="fluent:food-24-filled" style="color:var(--green-d)"></iconify-icon>식사</div>
          </div>
          <div style="position:relative;z-index:1">
            <div style="font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1">3<span style="font-size:16px;font-weight:600;color:var(--t3)"> 끼</span></div>
            <div class="meal-bars">
              <div class="meal-bar-row"><span class="meal-bar-label">아침</span><div class="meal-bar-bg"><div class="meal-bar-fill" style="width:100%;background:var(--green)"></div></div></div>
              <div class="meal-bar-row"><span class="meal-bar-label">점심</span><div class="meal-bar-bg"><div class="meal-bar-fill" style="width:55%;background:var(--amber)"></div></div></div>
              <div class="meal-bar-row"><span class="meal-bar-label">저녁</span><div class="meal-bar-bg"><div class="meal-bar-fill" style="width:90%;background:var(--green)"></div></div></div>
            </div>
          </div>
        </div>

        <!-- 기분 + 활동 결합 -->
        <div class="w grid-full" onclick="openSheet('mood')">
          <div class="w-head">
