  <title>하루안부 — 알림 설정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2C7AFC;--blue-l:#5B9BFF;--blue-d:#1D6AF2;
      --green:#34D399;--green-d:#059669;
      --amber:#F59E0B;--red:#EF4444;
      --t1:#111827;--t2:rgba(0,0,0,.5);--t3:rgba(0,0,0,.35);
      --bg:transparent;--surface:rgba(255,255,255,.88);
      --primary:#2C7AFC;--primary-light:rgba(44,122,252,.08);
      --critical:#EF4444;--success:#34D399;--guardian:#0891B2;
      --divider:rgba(0,0,0,.05);
      --space-xs:4px;--space-sm:8px;--space-md:12px;--space-lg:16px;--space-xl:20px;--space-2xl:28px;
      --radius-xs:4px;--radius-sm:10px;--radius-md:14px;--radius-lg:16px;--radius-xl:20px;--radius-full:999px;
      --text-mini:10px;--text-caption:11px;--text-callout:13px;--text-body:15px;--text-headline:16px;--text-title:20px;--text-display:28px;
      --weight-regular:400;--weight-medium:500;--weight-semibold:600;--weight-bold:700;
      --line-height-normal:1.4;--line-height-relaxed:1.6;
      --text-primary:#111827;--text-secondary:rgba(0,0,0,.5);--text-tertiary:rgba(0,0,0,.35);
      --shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.1);
      --font-family:'Pretendard Variable','Pretendard',-apple-system,system-ui,sans-serif;
      --font:'Pretendard Variable','Pretendard',-apple-system,system-ui,sans-serif;
      --transition-normal:.2s ease;--row-height:52px;
    }
    html{height:100%}
    body{font-family:var(--font);color:var(--t1);-webkit-font-smoothing:antialiased}
    body { background:var(--bg); max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:120px; }
    .content { padding:0 var(--space-lg); }

    .page-title-area {
      padding: var(--space-xl) 0 var(--space-lg);
    }
    .page-title {
      font-size: var(--text-display);
      font-weight: var(--weight-bold);
      padding: 0;
    }
    .page-subtitle {
      font-size: var(--text-callout);
      color: var(--text-secondary);
      margin-top: var(--space-xs);
    }

    .setting-group {
      background: var(--bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }
    .setting-group-title {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
      padding: var(--space-sm) var(--space-xs);
    }
    .setting-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      min-height: var(--row-height);
    }
    .setting-item + .setting-item {
      border-top: 0.5px solid var(--divider);
    }
    .setting-info { flex: 1; }
    .setting-label {
      font-size: var(--text-headline);
    }
    .setting-desc {
      font-size: var(--text-mini);
      color: var(--text-secondary);
      margin-top: 1px;
    }

    /* 토글 */
    .toggle {
      position: relative;
      width: 51px; height: 31px;
      background: var(--divider);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background var(--transition-normal);
      flex-shrink: 0;
    }
    .toggle.on { background: var(--success); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 27px; height: 27px;
      background: white;
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-normal);
    }
    .toggle.on::after { transform: translateX(20px); }

    /* ═══ Liquid Glass 통일 ═══ */
        html { background: #EEF3FB; }
    /* 배경 애니메이션 블롭 */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(180deg,#d4e4ff 0%,#e8f0fe 40%,#f2f6ff 70%,#EEF3FB 100%);pointer-events:none}
    .bg-logo{position:absolute;width:140%;height:auto;left:50%;top:42%;transform:translate(-50%,-50%);opacity:.06;filter:blur(32px);animation:bgl 8s ease-in-out infinite}
    @keyframes bgl{0%,100%{transform:translate(-50%,-50%)scale(1);opacity:.05}50%{transform:translate(-50%,-50%)scale(1.06)rotate(1.5deg);opacity:.08}}
    .bg .g1{position:absolute;width:500px;height:500px;left:50%;top:-5%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,rgba(44,122,252,.18)0%,transparent 65%);filter:blur(30px);animation:ga 8s ease-in-out infinite alternate}
    .bg .g2{position:absolute;width:600px;height:400px;left:50%;top:35%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(200,220,255,.25)0%,transparent 65%);filter:blur(40px);animation:gb 10s ease-in-out infinite alternate}
    .bg .g3{position:absolute;width:700px;height:500px;left:50%;bottom:-15%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(44,122,252,.08)0%,transparent 70%);filter:blur(35px);animation:gc 12s ease-in-out infinite alternate}
    @keyframes ga{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.08)translateY(12px)}}
    @keyframes gb{0%{transform:translate(-50%,-50%)scale(1)}100%{transform:translate(-52%,-48%)scale(1.05)}}
    @keyframes gc{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.06)translateY(-8px)}}
    /* 헤더 — 표준 */
    .header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 8px) 20px 10px;background:rgba(212,228,255,.85);transition:background .3s}
    .header.scrolled{background:rgba(255,255,255,.86)}
    .header-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
    .header-left,.header-right{width:36px;display:flex;align-items:center}
    .header-right{justify-content:flex-end}
    .nav-btn,.btn-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:transform .1s;color:var(--t1)}
    .nav-btn:active,.btn-icon:active{transform:scale(.93)}
    .nav-btn iconify-icon,.btn-icon iconify-icon{font-size:18px;color:var(--blue)}
    /* 글라스 카드 */
    .setting-group {
      background: rgba(255,255,255,0.26) !important; position: relative; overflow: hidden;
      backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      -webkit-backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      border: 0.5px solid rgba(255,255,255,0.70) !important;
      box-shadow: 0 1px 0 rgba(255,255,255,0.80) inset, 0 6px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05) !important;
    }
    .setting-group::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 55%); pointer-events: none; z-index: 0;
    }
    .setting-item + .setting-item { border-top: 0.5px solid rgba(255,255,255,0.28) !important; }
    .toggle { background: rgba(28,28,30,0.18) !important; }
    .toggle.on { background: var(--success) !important; }
    /* Tabbar override */
    .tabbar{flex:1;min-width:0;height:60px;background:rgba(210,225,250,.55);backdrop-filter:url(#glass-warp) blur(12px);-webkit-backdrop-filter:url(#glass-warp) blur(12px);border:1px solid rgba(255,255,255,.45);border-radius:999px;box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.4);display:flex;align-items:stretch;justify-content:space-around;padding:0 10px}
    .bottom-bar{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:40;width:calc(100% - 48px);max-width:370px}
    .ai-fab{width:60px;height:60px;border-radius:50%;background:rgba(210,225,250,.55);backdrop-filter:url(#glass-warp) blur(12px);-webkit-backdrop-filter:url(#glass-warp) blur(12px);border:1px solid rgba(255,255,255,.45);box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;flex-shrink:0;text-decoration:none}
    .ai-fab:active{transform:scale(.92)}
    .tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;padding:8px 4px;border-radius:999px;color:rgba(28,28,30,.45);text-decoration:none;transition:all .18s}
    .tab.active{color:#2C7AFC}
    .tab-icon{display:flex;align-items:center}
    .tab-icon svg{width:26px;height:26px;fill:currentColor}
      
      /* ── glassmorphism card layer ── */
    .w,.rec-card,.insight-card,.summary-card,.schedule-preview,
    .q-item,.article-card,.alert-card,.srow,.quick-btn,
    .chat-row,.mi-row,.pres-item,.billing-item,.tl-card {
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
  
    /* iOS PWA standalone 모드: url(#glass-warp) 미지원 → 순수 blur + 진한 배경으로 fallback */
    @media (display-mode: standalone) {
      .tabbar, .ai-fab {
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        background: rgba(220,232,252,.78) !important;
        border: 1px solid rgba(255,255,255,.6) !important;
      }
    }
  </style>

<svg style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <filter id="glass-warp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.008" numOctaves="3" seed="3" result="bigWarp"/>
      <feDisplacementMap in="SourceGraphic" in2="bigWarp" scale="55" xChannelSelector="R" yChannelSelector="R" result="d1"/>
      <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="7" result="fineWarp"/>
      <feDisplacementMap in="d1" in2="fineWarp" scale="12" xChannelSelector="R" yChannelSelector="R" result="d2"/>
      <feGaussianBlur in="d2" stdDeviation="2.5"/>
    </filter>
  </defs>
</svg>
