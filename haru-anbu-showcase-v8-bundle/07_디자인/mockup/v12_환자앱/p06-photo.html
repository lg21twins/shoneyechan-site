<!doctype html>
<html lang="ko" data-role="patient" data-platform="mobile">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF5E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>하루안부 · 사진 크게 보기</title>

  <link rel="icon" type="image/svg+xml" href="../07_디자인/logo/brand-system/01_심볼단독.svg">
  <link rel="stylesheet" href="../07_디자인/tokens/tokens.css">
  <link rel="stylesheet" href="patient.css">
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>

  <style>
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      gap: var(--space-5);
      min-height: 0;
    }

    /* ── 사진 주인 헤더 ─────────────────────── */
    .sender {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
    }
    .sender .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      overflow: hidden; position: relative; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(251, 146, 60, 0.25);
    }
    .sender .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .sender .who {
      font: var(--weight-bold) 24px / 1.1 var(--font-family-base);
      letter-spacing: -0.3px;
    }
    .sender .when {
      font: var(--weight-medium) 17px / 1.3 var(--font-family-base);
      color: var(--color-text-secondary);
      margin-top: 3px;
    }
    .sender .counter {
      margin-left: auto;
      font: var(--weight-bold) 20px / 1 var(--font-family-base);
      color: var(--brand-orange-700);
      background: var(--brand-orange-100);
      padding: 10px 18px; border-radius: 999px;
      letter-spacing: -0.2px;
    }

    /* ── 사진 무대 ─────────────────────────── */
    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: 88px 1fr 88px;
      align-items: center;
      gap: var(--space-4);
      padding: 0 var(--space-4);
    }

    .photo-frame {
      height: 100%;
      min-height: 0;
      border-radius: 28px;
      overflow: hidden;
      background: #FFEBD1;
      box-shadow: 0 12px 40px rgba(194, 98, 28, 0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .photo-frame img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #fff;
      border: 0; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-primary);
      transition: transform .15s, box-shadow .15s;
    }
    .nav-btn:hover { box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16); }
    .nav-btn:active { transform: scale(.93); }
    .nav-btn:disabled { opacity: .35; cursor: default; }
    .nav-btn iconify-icon { font-size: 42px; }

    /* ── 캡션 + 액션 ─────────────────────── */
    .bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-5) var(--space-6);
    }
    .caption {
      font: var(--weight-medium) 22px / 1.4 var(--font-family-base);
      color: var(--color-text-primary);
      letter-spacing: -0.2px;
    }
    .caption .quote {
      font-weight: 600;
    }

    .action {
      height: 76px;
      padding: 0 28px;
      border-radius: 20px;
      border: 0; cursor: pointer;
      display: inline-flex; align-items: center; gap: 12px;
      font: var(--weight-bold) 22px / 1 var(--font-family-base);
      letter-spacing: -0.2px;
      transition: transform .15s, box-shadow .15s;
      text-decoration: none;
    }
    .action--primary {
      background: linear-gradient(135deg, var(--brand-orange-400), var(--brand-orange-600));
      color: #fff;
      box-shadow: 0 8px 22px rgba(251, 146, 60, 0.35);
    }
    .action--ghost {
      background: #fff;
      color: var(--color-text-primary);
      border: 1.5px solid rgba(0, 0, 0, 0.08);
    }
    .action:active { transform: scale(.97); }

    /* ── 하단 썸네일 점 인디케이터 ─────────── */
    .dots {
      display: flex; align-items: center; gap: 10px;
      justify-content: center;
      padding: 0 var(--space-5);
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.14);
      transition: width .2s, background .2s;
    }
    .dot.active {
      width: 36px; border-radius: 6px;
      background: var(--brand-orange-500);
    }

    @media (max-width: 820px) {
      .stage { grid-template-columns: 60px 1fr 60px; gap: var(--space-3); padding: 0 var(--space-3); }
      .nav-btn { width: 60px; height: 60px; }
      .nav-btn iconify-icon { font-size: 28px; }
      .bottom { grid-template-columns: 1fr; text-align: center; }
      .action { width: 100%; justify-content: center; }
      .caption { font-size: 19px; }
      .sender .who { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="app">

    <header class="p-header p-header--nav">
      <a href="p07-message.html" class="p-back" aria-label="뒤로">
        <iconify-icon icon="fluent:chevron-left-24-filled" width="28" aria-hidden="true"></iconify-icon>
        뒤로
      </a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a class="nav-tab" href="p01-today.html">
          <iconify-icon icon="fluent:home-24-filled" width="22" aria-hidden="true"></iconify-icon>
          홈
        </a>
        <a class="nav-tab" href="p02-med-alert.html">
          <iconify-icon icon="fluent:clipboard-bullet-list-ltr-24-filled" width="22" aria-hidden="true"></iconify-icon>
          할일
        </a>
        <a class="nav-tab nav-tab--active" href="p03-call.html" aria-current="page">
          <iconify-icon icon="fluent:people-24-filled" width="22" aria-hidden="true"></iconify-icon>
          가족
        </a>
        <a class="nav-tab" href="p08-help.html">
          <iconify-icon icon="fluent:hand-wave-24-filled" width="22" aria-hidden="true"></iconify-icon>
          도움
        </a>
      </nav>
      <div aria-hidden="true"></div>
    </header>

    <div class="main">

      <!-- 사진 보낸 사람 -->
      <div class="sender glass">
        <div class="avatar">
          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">
        </div>
        <div>
          <div class="who">딸 민지</div>
          <div class="when">방금 · 사진 2장</div>
        </div>
        <div class="counter" id="counter">1 / 2</div>
      </div>

      <!-- 사진 무대 -->
      <div class="stage">
        <button class="nav-btn" type="button" id="prevBtn" aria-label="이전 사진" disabled>
          <iconify-icon icon="fluent:chevron-left-24-filled" aria-hidden="true"></iconify-icon>
        </button>

        <figure class="photo-frame">
          <img id="photoImg" src="https://picsum.photos/seed/minji-park-spring/1200/900" alt="민지가 보낸 공원 사진">
        </figure>

        <button class="nav-btn" type="button" id="nextBtn" aria-label="다음 사진">
          <iconify-icon icon="fluent:chevron-right-24-filled" aria-hidden="true"></iconify-icon>
        </button>
      </div>

      <!-- 캡션 + 액션 -->
      <div class="bottom glass">
        <div class="caption">
          <span class="quote" id="captionText">"엄마, 오늘 수지랑 공원 다녀왔어요. 날씨가 너무 좋아요!"</span>
        </div>
        <a href="p07-message.html" class="action action--ghost">
          <iconify-icon icon="fluent:chat-24-filled" width="26" aria-hidden="true"></iconify-icon>
          답장하기
        </a>
        <a href="p03-call.html" class="action action--primary">
          <iconify-icon icon="fluent:video-24-filled" width="26" aria-hidden="true"></iconify-icon>
          민지에게 전화
        </a>
      </div>

      <div class="dots" aria-hidden="true">
        <span class="dot active" id="dot0"></span>
        <span class="dot" id="dot1"></span>
      </div>

    </div>
  </div>

  <script>
    // 2장 간단 캐러셀
    (function () {
      var photos = [
        {
          src: 'https://picsum.photos/seed/minji-park-spring/1200/900',
          caption: '"엄마, 오늘 수지랑 공원 다녀왔어요. 날씨가 너무 좋아요!"'
        },
        {
          src: 'https://picsum.photos/seed/minji-sooji-smile/1200/900',
          caption: '"수지 한껏 웃는 얼굴. 할머니 보여드리고 싶어서."'
        }
      ];
      var idx = 0;
      var img = document.getElementById('photoImg');
      var cap = document.getElementById('captionText');
      var counter = document.getElementById('counter');
      var prev = document.getElementById('prevBtn');
      var next = document.getElementById('nextBtn');
      var dots = [document.getElementById('dot0'), document.getElementById('dot1')];

      function render() {
        img.src = photos[idx].src;
        cap.textContent = photos[idx].caption;
        counter.textContent = (idx + 1) + ' / ' + photos.length;
        prev.disabled = idx === 0;
        next.disabled = idx === photos.length - 1;
        dots.forEach(function (d, i) {
          d.classList.toggle('active', i === idx);
        });
      }
      prev.addEventListener('click', function () { if (idx > 0) { idx--; render(); } });
      next.addEventListener('click', function () { if (idx < photos.length - 1) { idx++; render(); } });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowLeft') prev.click();
        if (e.key === 'ArrowRight') next.click();
      });
    })();
  </script>

</body>
</html>
