<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루안부 발표 진행 뷰</title>
<style>
  :root{
    --blue:#2C7AFC; --ink:#1A1D23; --ink2:#3A4049; --mute:#8A9099;
    --line:#E9ECF0; --paper:#F6F8FA; --cloverbg:#EEF4FF; --shonbg:#F2F3F5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#fff;color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  .top{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .top h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .top .meta{font-size:13px;color:var(--mute)}
  .legend{display:flex;gap:10px;margin-left:auto;font-size:12px;align-items:center;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-weight:600}
  .chip.clover{color:var(--blue);background:var(--cloverbg)}
  .chip.shon{color:var(--ink);background:var(--shonbg)}
  .wrap{max-width:880px;margin:0 auto;padding:24px 24px 160px}
  .help{font-size:13px;color:var(--ink2);background:var(--paper);border-radius:10px;padding:12px 16px;margin-bottom:8px}
  .help b{color:var(--blue)}
  .stage{margin-top:34px}
  .stage-head{display:flex;align-items:baseline;gap:12px;padding-bottom:8px;border-bottom:2px solid var(--ink);margin-bottom:8px}
  .stage-no{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.04em;font-feature-settings:"tnum" 1}
  .stage-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .stage-screen{font-size:13px;color:var(--mute);margin-left:auto;text-align:right;max-width:50%}
  .line{display:flex;gap:14px;padding:14px 12px;border-radius:12px;cursor:pointer;transition:background .12s}
  .line:hover{background:var(--paper)}
  .line.cur{background:#FFF7E6;box-shadow:inset 3px 0 0 #F0A000}
  .badge{flex-shrink:0;width:118px}
  .who{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .who.clover{color:#fff;background:var(--blue)}
  .who.shon{color:#fff;background:var(--ink)}
  .act{display:block;margin-top:7px;font-size:12px;font-weight:600}
  .act.live{color:var(--mute)}
  .play{margin-top:7px;font:inherit;font-size:12px;font-weight:700;color:#fff;background:var(--blue);border:none;border-radius:8px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .play.playing{background:var(--ink)}
  .say{flex:1;min-width:0;font-size:21px;letter-spacing:-.01em;word-break:keep-all;line-height:1.5}
  .line.shon .say{color:var(--ink2)}
  .num{flex-shrink:0;width:26px;text-align:right;font-size:13px;color:var(--mute);font-feature-settings:"tnum" 1;padding-top:5px}
  @media (max-width:680px){ .badge{width:96px} .say{font-size:19px} .stage-screen{display:none} }
</style>
</head>
<body>
<div class="top">
  <h1>하루안부 발표 진행 뷰</h1>
  <span class="meta">Shon ↔ 네잎클로버 · 약 3분 (타이트 버전)</span>
  <div class="legend">
    <span class="chip clover">네잎클로버 = 음원 ▶</span>
    <span class="chip shon">Shon = 직접</span>
  </div>
</div>
<div class="wrap">
  <div class="help">
    파란 줄 = <b>네잎클로버 음원</b>(▶ 또는 사이트 점 버튼). 검은 줄 = <b>Shon 직접</b> 발화.<br>
    줄 <b>클릭</b> = 현재 위치 표시. <b>↓ / Space</b> = 다음(음원 자동재생), <b>↑</b> = 이전.
  </div>
  <div id="list"></div>
</div>
<script>
const C='clover', S='shon';
const STAGES = [
  { t:'인트로 — 팀 소개', screen:'화면: Hero "하루안부."', lines:[
    {w:S, text:"안녕하세요. 저희는 '노인과 바다 그리고 네잎클로버' 팀입니다. 오늘 발표는 저희 팀의 한 멤버가 맡습니다. 사람이 아니라, 에이아이예요."},
    {w:C, clip:'01', text:"안녕하세요. 저는 네잎클로버입니다. 하루안부 안에서 일하는 이 팀의 에이아이예요. 우리가 만든 하루를, 제가 직접 안내하겠습니다."},
    {w:S, text:"네, 우리 팀 네잎클로버예요. 그럼 시작해 줄래요?"},
  ]},
  { t:'Hero + Overview', screen:'화면: "하루안부." → "세 시선을 잇는 케어 커뮤니케이션 플랫폼"', lines:[
    {w:C, clip:'02', text:"하루안부. 환자, 케어팀, 보호자. 흩어진 세 시선을, 하루의 안부 한 줄로 잇는 케어 플랫폼입니다."},
    {w:C, clip:'03', text:"세 시선을, 다섯 개의 화면으로 연결합니다."},
    {w:S, text:"왜 필요했는지부터 볼까요?"},
  ]},
  { t:'Problem — 왜 지금인가', screen:'화면: "잘 계십니다. 아마도?" → 고령화 차트', lines:[
    {w:C, clip:'04', text:"잘 계십니다… 아마도? 부모님 안부는, 매일 아침 가장 무거운 질문입니다."},
    {w:S, text:"전화 끊고 늘 따라붙는 그 마음이죠."},
    {w:C, clip:'05', text:"한국은 세계에서 가장 빠르게 늙어가는 나라입니다. 육십오 세 이상 일인 가구가 이백십사만 명, 노인 빈곤율은 오이씨디 일 위. 그런데 연결되는 방식은, 아직 전화 한 통뿐입니다."},
  ]},
  { t:'App-preview — 하나로 모으다', screen:'화면: 하루안부 중심으로 기능 칩(음성안부·복약·긴급호출·리포트)', lines:[
    {w:C, clip:'06', text:"그래서 저는, 하루안부 하나에 모았습니다. 음성 안부, 복약 알림, 긴급 호출, 활동 리포트까지 한곳에서 움직입니다."},
  ]},
  { t:'Direction — 방향', screen:'화면: "흩어진 세 시선을 한 하루로 잇습니다."', lines:[
    {w:C, clip:'07', text:"방향은 하나입니다. 흩어진 세 시선을, 한 하루로 잇습니다."},
  ]},
  { t:'Design — 브랜드 & 컬러', screen:'화면: 로고(두 곡선) → 타이포 → 컬러 시스템', lines:[
    {w:C, clip:'08', text:"디자인도 같은 약속을 따릅니다. 로고의 두 곡선은, 보호자와 환자, 그 사이를 잇는 케어팀이 한 점에서 만나는 모습이에요."},
    {w:S, text:"세 색으로 나뉘네요?"},
    {w:C, clip:'09', text:"보호자는 블루, 케어팀은 그린, 환자는 오렌지. 누구의 정보인지, 색으로 바로 보입니다."},
  ]},
  { t:'Persona — 같은 하루, 세 시점', screen:'화면: 보호자 / 환자 / 케어팀 시점 전환', lines:[
    {w:C, clip:'10', text:"같은 하루가, 세 시점에서 다릅니다. 보호자는 안심을 받고, 어르신은 버튼 하나로 안부를 전하고, 케어팀은 기록하는 순간 그게 곧 안부가 됩니다."},
  ]},
  { t:'Service — 여섯 가지 핵심 기능', screen:'화면: "서비스를 가로지르는 여섯 가지 핵심 기능"', lines:[
    {w:C, clip:'11', text:"어떤 화면을 열어도, 여섯 기능이 함께 작동합니다. 자동 리포트, 안심지수, 그리고 새벽 에스오에스는 평균 삼 분 안에 연결됩니다."},
  ]},
  { t:'Flagship — 특히 자신 있는 넷', screen:'화면: 시그니처 4카드 (AI요약·실시간동기화·다국어·의료통합)', lines:[
    {w:C, clip:'12', text:"그중 넷은 특히 자신 있습니다. 매일 아침 어제를 정리하고, 기록은 곧장 가족에게 닿고, 한국어 워크플로우가 모국어로 동작하고, 데스크와 회진이 한 데이터에서 만납니다."},
  ]},
  { t:'5앱 라이브 (시그니처)', screen:'화면: features-by-role — 5앱 순서대로 (보호자→환자→요양보호사→의료진앱→의료진웹)', lines:[
    {w:C, clip:'13', sec:'01 보호자 · Mobile', text:"보호자에게는, 매일 아침 먼저 전해집니다. 어제의 부모님이, 한 카드로 도착합니다."},
    {w:S, text:"떨어져 사는 자식한텐, 이 한 카드가 크죠."},
    {w:C, clip:'14', sec:'02 환자 · Tablet', text:"어르신에게는, 글자는 크게 터치는 넓게. 누구나 오 초면 도움을 청합니다."},
    {w:C, clip:'15', sec:'03 요양보호사 · Mobile', text:"요양보호사에게는, 현장에서 십 초면 오늘 기록이 끝납니다."},
    {w:S, text:"외국인 요양보호사도 많잖아요?"},
    {w:C, clip:'16', text:"한국어로 만든 이 화면이, 모국어로 그대로 동작합니다."},
    {w:C, clip:'17', sec:'04 의료진 앱 · Mobile (의사)', text:"의사에게는, 병동을 걸으며 처치부터 인계까지. 기록은 한 손으로 끝납니다."},
    {w:C, clip:'18', sec:'05 의료진 웹 · PC (간호사)', text:"간호사에게는, 전체 환자를 한 화면에. 봐야 할 환자를, 먼저 보여드립니다."},
    {w:S, text:"데스크가 훨씬 가벼워지겠네요."},
    {w:S, sec:'라이브 증명 (직접 탭!)', text:"이게 다 모형이 아니에요. 지금 직접 만지면, 진짜 열립니다."},
    {w:C, clip:'19', text:"지금 보시는 다섯 화면 모두, 실제로 작동합니다."},
  ]},
  { t:'Closing — 마무리', screen:'화면: "오늘 하루도, 안녕하셨습니다."', lines:[
    {w:C, clip:'20', text:"매일 잊지 않고 안부를 묻는 마음. 그 마음을 한 화면에 옮긴 것이, 하루안부입니다."},
    {w:C, clip:'21', text:"오늘 하루도, 안녕하셨습니다."},
  ]},
  { t:'송별', screen:'화면: closing 유지', lines:[
    {w:S, text:"저희 '노인과 바다 그리고 네잎클로버'였습니다. 감사합니다."},
  ]},
];

const fmt = t => t.replace(/([.?!])\s+/g, '$1<br>');
const list = document.getElementById('list');
const rows = [];
let visNo = 0;
STAGES.forEach((st)=>{
  const stage = document.createElement('section'); stage.className='stage';
  visNo++;
  const head = document.createElement('div'); head.className='stage-head';
  head.innerHTML = `<span class="stage-no">STAGE ${visNo}</span><span class="stage-title">${st.t}</span><span class="stage-screen">${st.screen}</span>`;
  stage.appendChild(head);
  st.lines.forEach(l=>{
    const row = document.createElement('div');
    row.className = 'line ' + (l.w===C?'clover':'shon');
    const idx = rows.length;
    const who = l.w===C ? '네잎클로버' : 'Shon';
    let badge = `<span class="who ${l.w===C?'clover':'shon'}">${who}</span>`;
    badge += l.w===C ? `<button class="play" data-clip="${l.clip}">▶ 음원 ${l.clip}</button>` : `<span class="act live">직접 말하기</span>`;
    const secTag = l.sec ? `<div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">${l.sec}</div>` : '';
    row.innerHTML = `<div class="num">${idx+1}</div><div class="badge">${badge}</div><div class="say">${secTag}${fmt(l.text)}</div>`;
    row.addEventListener('click', (e)=>{ if(e.target.closest('.play')) return; setCurrent(idx); });
    stage.appendChild(row);
    rows.push({el:row, line:l});
  });
  list.appendChild(stage);
});

let current=null, curIdx=-1;
function stopAudio(){ if(current){ current.audio.pause(); current.btn.classList.remove('playing'); current.btn.textContent='▶ 음원 '+current.clip; current=null; } }
function playClip(btn){
  const clip=btn.dataset.clip;
  if(current&&current.btn===btn){ stopAudio(); return; }
  stopAudio();
  const audio=new Audio(`audio/clover/clover-${clip}.mp3?v=v9`);
  current={audio,btn,clip};
  btn.classList.add('playing'); btn.textContent='■ 정지 '+clip;
  audio.play().catch(()=>{});
  audio.addEventListener('ended', ()=>{ if(current&&current.btn===btn) stopAudio(); });
}
document.querySelectorAll('.play').forEach(b=> b.addEventListener('click', ()=>playClip(b)) );
function setCurrent(idx, autoplay){
  if(idx<0||idx>=rows.length) return;
  rows.forEach(r=>r.el.classList.remove('cur'));
  curIdx=idx; const r=rows[idx];
  r.el.classList.add('cur'); r.el.scrollIntoView({behavior:'smooth',block:'center'});
  if(autoplay && r.line.w===C){ const btn=r.el.querySelector('.play'); if(btn) playClip(btn); }
}
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowDown'||e.key===' '){ e.preventDefault(); setCurrent(curIdx+1,true); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); stopAudio(); setCurrent(curIdx-1,false); }
});
</script>
</body>
</html>
