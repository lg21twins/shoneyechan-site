<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d4e4ff">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 알림</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#2C7AFC;--blue-l:#5B9BFF;--blue-d:#1D6AF2;
      --green:#34D399;--green-d:#059669;
      --amber:#F59E0B;--red:#EF4444;
      --t1:#111827;--t2:rgba(0,0,0,.5);--t3:rgba(0,0,0,.35);
      --font:'Pretendard Variable','Pretendard',-apple-system,system-ui,sans-serif;
    }
    html{height:100%;background:#d4e4ff}
    body{height:100%;font-family:var(--font);color:var(--t1);-webkit-font-smoothing:antialiased;background:transparent;overflow-x:hidden}

    /* 배경 */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(180deg,#d4e4ff 0%,#e8f0fe 40%,#f2f6ff 70%,#EEF3FB 100%);pointer-events:none}
    .bg-logo{position:absolute;width:140%;height:auto;left:50%;top:42%;transform:translate(-50%,-50%);opacity:.06;filter:blur(32px);animation:bgl 8s ease-in-out infinite}
    @keyframes bgl{0%,100%{transform:translate(-50%,-50%)scale(1);opacity:.05}50%{transform:translate(-50%,-50%)scale(1.06)rotate(1.5deg);opacity:.08}}
    .bg .g1{position:absolute;width:500px;height:500px;left:50%;top:-5%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,rgba(44,122,252,.14)0%,transparent 65%);filter:blur(30px)}
    .bg .g2{position:absolute;width:600px;height:400px;left:50%;top:35%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(200,220,255,.20)0%,transparent 65%);filter:blur(40px)}

    .app{max-width:430px;margin:0 auto;min-height:100%;position:relative;padding-bottom:calc(max(env(safe-area-inset-bottom,0px),20px) + 112px)}

    /* 헤더 */
    .header{position:sticky;top:0;z-index:30;padding:calc(env(safe-area-inset-top,0px) + 8px) 20px 10px;background:rgba(212,228,255,.85);transition:background .3s}
    .header.scrolled{background:rgba(255,255,255,.86)}
    .header-inner{display:flex;align-items:center;justify-content:space-between}
    .header-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
    .nav-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;transition:transform .1s}
    .nav-btn:active{transform:scale(.93)}

    .content{position:relative;z-index:1;padding:4px 16px 0}

    /* ========== 진행 중 카드 ========== */
    .live-card{
      background:rgba(255,255,255,.85);
      border:1px solid rgba(255,255,255,.5);
      border-radius:22px;
      padding:22px;
      margin-bottom:22px;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .live-head{
      display:flex;align-items:flex-start;gap:14px;
      margin-bottom:16px;
    }
    .live-icon{
      width:44px;height:44px;border-radius:14px;
      background:rgba(0,0,0,.05);
      color:var(--t1);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .live-body{flex:1;min-width:0}
    .live-title{
      font-size:17px;font-weight:800;color:var(--t1);
      letter-spacing:-.3px;line-height:1.25;
    }
    .live-sub{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
      margin-top:7px;
    }
    .live-badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:11px;font-weight:700;
      color:var(--blue);
      background:rgba(44,122,252,.1);
      padding:3px 9px;border-radius:999px;
      letter-spacing:.2px;
    }
    .live-badge-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--blue);
      animation:ping-blue 1.6s ease-out infinite;
    }
    @keyframes ping-blue{
      0%{box-shadow:0 0 0 0 rgba(44,122,252,.5)}
      70%{box-shadow:0 0 0 5px rgba(44,122,252,0)}
      100%{box-shadow:0 0 0 0 rgba(44,122,252,0)}
    }
    .live-meta{
      font-size:13px;color:var(--t2);
      letter-spacing:-.1px;
    }
    .live-meta strong{
      color:var(--t1);font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    /* 스텝 플로우 */
    .live-steps{
      display:flex;align-items:flex-start;
      background:rgba(44,122,252,.05);
      border-radius:14px;
      padding:16px 14px 14px;
      margin-bottom:14px;
    }
    .step{
      flex:1;min-width:0;
      display:flex;flex-direction:column;align-items:center;gap:7px;
    }
    .step-line{
      flex-shrink:0;
      height:2px;width:20px;
      background:rgba(0,0,0,.1);
      margin-top:4px;
    }
    .step--done ~ .step-line,
    .step-line + .step--done + .step-line{background:rgba(44,122,252,.3)}
    .step-dot{
      width:10px;height:10px;border-radius:50%;
      background:#fff;
      border:2px solid rgba(0,0,0,.2);
    }
    .step--done .step-dot{
      background:var(--blue);border-color:var(--blue);
    }
    .step--current .step-dot{
      background:var(--blue);border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(44,122,252,.18);
      animation:pulse-blue 1.8s ease-in-out infinite;
    }
    @keyframes pulse-blue{
      0%,100%{box-shadow:0 0 0 4px rgba(44,122,252,.18)}
      50%{box-shadow:0 0 0 7px rgba(44,122,252,.08)}
    }
    .step-time{
      font-size:10px;font-weight:700;color:var(--t3);
      font-variant-numeric:tabular-nums;letter-spacing:.2px;
    }
    .step-text{
      font-size:11px;font-weight:500;color:var(--t2);
      white-space:nowrap;
    }
    .step--current .step-time{color:var(--blue)}
    .step--current .step-text{color:var(--t1);font-weight:700}

    /* 인라인 CTA */
    .live-action{
      display:flex;align-items:center;justify-content:center;gap:8px;
      height:48px;border-radius:14px;
      background:var(--blue);color:#fff;
      font-family:var(--font);font-size:14px;font-weight:700;letter-spacing:-.2px;
      text-decoration:none;
      box-shadow:0 4px 14px rgba(44,122,252,.22);
      transition:transform .1s;
    }
    .live-action:active{transform:scale(.98)}

    /* ========== 피드 섹션 ========== */
    .feed-section-title{
      font-size:13px;font-weight:700;color:var(--t2);
      padding:6px 4px 10px;
      letter-spacing:-.2px;
    }
    .feed-card{
      background:rgba(255,255,255,.80);
      border:1px solid rgba(255,255,255,.45);
      border-radius:20px;
      overflow:hidden;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .feed-item{
      display:flex;align-items:center;gap:12px;
      padding:14px 18px;
      text-decoration:none;color:inherit;
      transition:background .12s;
    }
    .feed-item+.feed-item{border-top:1px solid rgba(0,0,0,.05)}
    .feed-item:active{background:rgba(0,0,0,.02)}
    .feed-icon{
      width:36px;height:36px;border-radius:12px;
      background:rgba(0,0,0,.05);
      color:var(--t2);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .feed-icon--alert{
      background:rgba(239,68,68,.08);
      color:var(--red);
    }
    .feed-body{flex:1;min-width:0}
    .feed-title{
      display:flex;align-items:center;gap:6px;
      font-size:14px;font-weight:700;color:var(--t1);
      line-height:1.3;letter-spacing:-.2px;
    }
    .feed-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--red);
      flex-shrink:0;
    }
    .feed-meta{
      font-size:12px;color:var(--t3);margin-top:2px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
      letter-spacing:-.1px;
    }
    .feed-time{
      font-size:12px;font-weight:600;color:var(--t3);
      flex-shrink:0;
      font-variant-numeric:tabular-nums;
      letter-spacing:.2px;
    }

    /* 탭바 */
    .tabbar{flex:1;min-width:0;height:60px;background:rgba(210,225,250,.55);backdrop-filter:url(#glass-warp) blur(12px);-webkit-backdrop-filter:url(#glass-warp) blur(12px);border:1px solid rgba(255,255,255,.45);border-radius:999px;box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.4);display:flex;align-items:stretch;justify-content:space-around;padding:0 10px}
    .bottom-bar{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:40;width:calc(100% - 48px);max-width:370px}
    .ai-fab{width:60px;height:60px;border-radius:50%;background:rgba(210,225,250,.55);backdrop-filter:url(#glass-warp) blur(12px);-webkit-backdrop-filter:url(#glass-warp) blur(12px);border:1px solid rgba(255,255,255,.45);box-shadow:0 4px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;flex-shrink:0;text-decoration:none}
    .ai-fab:active{transform:scale(.92)}
    .tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex:1;padding:8px 4px;border-radius:999px;color:rgba(28,28,30,.45);text-decoration:none;transition:all .18s}
    .tab.active{color:var(--blue)}
    .tab-icon{display:flex;align-items:center}
    .tab-icon svg{width:26px;height:26px;fill:currentColor}

    /* iOS PWA standalone 모드 */
    @media (display-mode: standalone) {
      .tabbar, .ai-fab {
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        background: rgba(220,232,252,.78) !important;
        border: 1px solid rgba(255,255,255,.6) !important;
      }
    }
  </style>
</head>
<body>
<svg style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <filter id="glass-warp" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.008" numOctaves="3" seed="3" result="bigWarp"/>
      <feDisplacementMap in="SourceGraphic" in2="bigWarp" scale="55" xChannelSelector="R" yChannelSelector="R" result="d1"/>
      <feTurbulence type="turbulence" baseFrequency="0.025 0.03" numOctaves="2" seed="7" result="fineWarp"/>
      <feDisplacementMap in="d1" in2="fineWarp" scale="12" xChannelSelector="R" yChannelSelector="R" result="d2"/>
      <feGaussianBlur in="d2" stdDeviation="2.5"/>
    </filter>
  </defs>
</svg>


  <!-- 배경 -->
  <div class="bg"><svg class="bg-logo" viewBox="0 0 2526 2526" fill="none"><path d="M2521.32 2506.66C1239.65 2657.48 1239.65 1895.6 1239.65 1279.34L2497.69 .00017C2518.68 494.198 2522.27 1157.92 1658.86 1262.48 2641.88 1314.25 2521.32 2101.84 2521.32 2506.66Z" fill="#2C7AFC"/><path d="M4.677 19.335C1286.35-131.481 1286.35 630.399 1286.35 1246.66L28.315 2526C7.322 2031.8 3.73 1368.08 867.143 1263.52-115.881 1211.75 4.677 424.157 4.677 19.335Z" fill="#2C7AFC"/></svg><div class="g1"></div><div class="g2"></div></div>

  <div class="app">
    <!-- 헤더 -->
    <div class="header">
      <div class="header-inner">
        <a href="g-guardian-live.html" class="nav-btn" aria-label="뒤로 가기">
          <iconify-icon icon="fluent:chevron-left-24-filled" style="font-size:16px;color:var(--t2)"></iconify-icon>
        </a>
        <span class="header-title">알림</span>
        <div style="width:36px"></div>
      </div>
    </div>

    <div class="content">

      <!-- 진행 중 카드 -->
      <section class="live-card" aria-label="지금 대응 중인 알림">
        <div class="live-head">
          <div class="live-icon" aria-hidden="true">
            <iconify-icon icon="fluent:heart-pulse-24-filled" style="font-size:22px"></iconify-icon>
          </div>
          <div class="live-body">
            <div class="live-title">혈압 이상이 감지됐어요</div>
            <div class="live-sub">
              <span class="live-badge"><span class="live-badge-dot" aria-hidden="true"></span>대응 중</span>
              <span class="live-meta">손정희님 · <strong>150/95 mmHg</strong></span>
            </div>
          </div>
        </div>

        <div class="live-steps" aria-label="대응 진행 상황">
          <div class="step step--done">
            <span class="step-dot" aria-hidden="true"></span>
            <span class="step-time">2:30</span>
            <span class="step-text">이상 감지</span>
          </div>
          <div class="step-line" aria-hidden="true"></div>
          <div class="step step--done">
            <span class="step-dot" aria-hidden="true"></span>
            <span class="step-time">2:32</span>
            <span class="step-text">간호사 도착</span>
          </div>
          <div class="step-line" aria-hidden="true"></div>
          <div class="step step--current" aria-current="step">
            <span class="step-dot" aria-hidden="true"></span>
            <span class="step-time">2:35</span>
            <span class="step-text">재측정 중</span>
          </div>
        </div>

        <a href="g03-sotong.html" class="live-action">
          <iconify-icon icon="fluent:chat-24-filled" style="font-size:18px"></iconify-icon>
          김미영 간호사에게 연락
        </a>
      </section>

      <!-- 오늘의 알림 피드 -->
      <div>
        <div class="feed-section-title">오늘의 알림</div>
        <div class="feed-card">

          <a href="#" class="feed-item">
            <div class="feed-icon feed-icon--alert" aria-hidden="true">
              <iconify-icon icon="fluent:heart-pulse-24-filled" style="font-size:18px"></iconify-icon>
            </div>
            <div class="feed-body">
              <div class="feed-title"><span class="feed-dot" aria-hidden="true"></span>혈압 이상 감지</div>
              <div class="feed-meta">손정희님 · 150/95 mmHg</div>
            </div>
            <div class="feed-time">14:30</div>
          </a>

          <a href="#" class="feed-item">
            <div class="feed-icon" aria-hidden="true">
              <iconify-icon icon="fluent:food-24-filled" style="font-size:18px"></iconify-icon>
            </div>
            <div class="feed-body">
              <div class="feed-title">점심 식사 완료</div>
              <div class="feed-meta">손정희님 · 90% 드셨어요</div>
            </div>
            <div class="feed-time">13:00</div>
          </a>

          <a href="#" class="feed-item">
            <div class="feed-icon" aria-hidden="true">
              <iconify-icon icon="fluent:person-walking-20-filled" style="font-size:18px"></iconify-icon>
            </div>
            <div class="feed-body">
              <div class="feed-title">산책 30분 완료</div>
              <div class="feed-meta">손정희님 · 정원 한 바퀴</div>
            </div>
            <div class="feed-time">11:30</div>
          </a>

          <a href="#" class="feed-item">
            <div class="feed-icon" aria-hidden="true">
              <iconify-icon icon="fluent:pill-24-filled" style="font-size:18px"></iconify-icon>
            </div>
            <div class="feed-body">
              <div class="feed-title">오전 투약 완료</div>
              <div class="feed-meta">손정희님 · 혈압약·당뇨약 2종</div>
            </div>
            <div class="feed-time">9:00</div>
          </a>

          <a href="#" class="feed-item">
            <div class="feed-icon" aria-hidden="true">
              <iconify-icon icon="fluent:heart-pulse-24-filled" style="font-size:18px"></iconify-icon>
            </div>
            <div class="feed-body">
              <div class="feed-title">오전 혈압 측정</div>
              <div class="feed-meta">손정희님 · 130/85 정상</div>
            </div>
            <div class="feed-time">9:00</div>
          </a>

        </div>
      </div>

    </div>

    <!-- 탭바 -->
    <div class="bottom-bar">
      <nav class="tabbar">
      <a href="g-guardian-live.html" class="tab" aria-label="홈"><span class="tab-icon"><iconify-icon icon="fluent:home-24-filled" style="font-size:26px"></iconify-icon></span></a>
      <a href="g02-ai-guide.html" class="tab" aria-label="AI 가이드"><span class="tab-icon"><iconify-icon icon="ph:book-open-text-fill" style="font-size:26px"></iconify-icon></span></a>
      <a href="g03-sotong.html" class="tab" aria-label="소통"><span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.81 2 10.5c0 2.65 1.56 5.02 4 6.56V22l4.34-2.41c.54.07 1.1.11 1.66.11 5.52 0 10-3.81 10-8.5S17.52 2 12 2z"/></svg></span></a>
      <a href="g05-records.html" class="tab" aria-label="기록"><span class="tab-icon"><iconify-icon icon="fluent:folder-24-filled" style="font-size:26px"></iconify-icon></span></a>
      <a href="g05-mypage.html" class="tab" aria-label="마이"><span class="tab-icon"><iconify-icon icon="fluent:person-24-filled" style="font-size:26px"></iconify-icon></span></a>
    </nav>
      <a href="g03-chat-ai.html" class="ai-fab" aria-label="AI 대화">
        <svg width="18" height="18" viewBox="0 0 2526 2526" fill="#2C7AFC"><path d="M2521.32 2506.66C1239.65 2657.48 1239.65 1895.6 1239.65 1279.34L2497.69 0C2518.68 494.198 2522.27 1157.92 1658.86 1262.48C2641.88 1314.25 2521.32 2101.84 2521.32 2506.66Z"/><path d="M4.677 19.335C1286.35-131.481 1286.35 630.399 1286.35 1246.66L28.315 2526C7.322 2031.8 3.73 1368.08 867.143 1263.52C-115.881 1211.75 4.677 424.157 4.677 19.335Z"/></svg>
      </a>
    </div>
  </div>

<script>
  // 헤더 스크롤 처리
  window.addEventListener('scroll',function(){
    document.querySelector('.header').classList.toggle('scrolled',window.scrollY>10);
  });
</script>
