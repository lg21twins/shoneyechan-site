<!doctype html>
<html lang="ko" data-role="patient" data-platform="mobile">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF5E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>하루안부 · 말벗과 대화</title>

  <link rel="icon" type="image/svg+xml" href="../07_디자인/logo/brand-system/01_심볼단독.svg">
  <link rel="stylesheet" href="../07_디자인/tokens/tokens.css">
  <link rel="stylesheet" href="patient.css">
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>

  <style>
    .main {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: var(--space-6);
      align-items: stretch;
      min-height: 0;
    }

    /* ── 대화 영역 — 최근 교환 1개만 보이도록 ───────── */
    .convo {
      padding: var(--space-6) var(--space-7);
      display: flex; flex-direction: column; gap: var(--space-5);
      overflow: hidden;
      min-height: 0;
    }

    .bubble {
      display: flex; gap: var(--space-4);
      align-items: flex-start;
      max-width: 88%;
    }
    .bubble--ai { align-self: flex-start; }
    .bubble--user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .b-avatar {
      width: 64px; height: 64px; border-radius: 20px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 11px;
      background: linear-gradient(135deg, var(--brand-orange-300), var(--brand-orange-500));
      box-shadow: 0 4px 14px rgba(251, 146, 60, 0.32);
    }
    .b-avatar svg { width: 100%; height: 100%; display: block; }

    .b-avatar--user {
      background: #fff;
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .b-avatar--user img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .b-content {
      display: flex; flex-direction: column; gap: 6px;
      flex: 1; min-width: 0;
    }
    .b-who {
      font: var(--weight-bold) 17px / 1 var(--font-family-base);
      color: var(--color-text-secondary);
      letter-spacing: -0.2px;
    }
    .bubble--user .b-who { text-align: right; }
    .b-text {
      font: var(--weight-medium) 26px / 1.45 var(--font-family-base);
      letter-spacing: -0.3px;
      padding: 18px 24px;
      border-radius: 22px;
    }
    .bubble--ai .b-text {
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      color: var(--color-text-primary);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }
    .bubble--user .b-text {
      background: linear-gradient(135deg, var(--brand-orange-100), #FFE4C4);
      color: var(--color-text-primary);
      border: 1px solid rgba(251, 146, 60, 0.25);
    }

    /* 인식 중 사용자 텍스트 — 부드럽게 blink */
    .b-text--live {
      color: var(--brand-orange-700);
      font-style: normal;
    }
    .b-text--live::after {
      content: '…';
      display: inline-block;
      margin-left: 6px;
      animation: dot-blink 1.2s var(--easing-standard) infinite;
    }
    @keyframes dot-blink {
      0%, 100% { opacity: .3; }
      50%      { opacity: 1; }
    }

    /* ── 듣는 중 히어로 — 파형 + 상태 ─────────── */
    .listening {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
      padding: var(--space-3) 0;
    }
    .wave {
      display: flex; align-items: center; gap: 10px;
      height: 84px;
    }
    .wave span {
      display: block;
      width: 12px;
      border-radius: 6px;
      background: linear-gradient(180deg, var(--brand-orange-400), var(--brand-orange-600));
      animation: wave-bounce 1.1s var(--easing-standard) infinite;
    }
    .wave span:nth-child(1) { animation-delay: 0s;    height: 30px; }
    .wave span:nth-child(2) { animation-delay: .12s;  height: 54px; }
    .wave span:nth-child(3) { animation-delay: .24s;  height: 72px; }
    .wave span:nth-child(4) { animation-delay: .36s;  height: 84px; }
    .wave span:nth-child(5) { animation-delay: .48s;  height: 66px; }
    .wave span:nth-child(6) { animation-delay: .60s;  height: 44px; }
    .wave span:nth-child(7) { animation-delay: .72s;  height: 28px; }
    @keyframes wave-bounce {
      0%, 100% { transform: scaleY(.35); opacity: .75; }
      50%      { transform: scaleY(1);   opacity: 1; }
    }
    .listen-status {
      font: var(--weight-bold) 28px / 1 var(--font-family-base);
      letter-spacing: -0.3px;
      color: var(--brand-orange-700);
    }
    .listen-hint {
      font: var(--weight-medium) 18px / 1.3 var(--font-family-base);
      color: var(--color-text-secondary);
      margin-top: -2px;
    }

    /* ── 액션 버튼 줄 ─────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    .a-btn {
      height: 96px;
      border: 0; cursor: pointer;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font: var(--weight-bold) 24px / 1 var(--font-family-base);
      letter-spacing: -0.3px;
      transition: transform .15s, box-shadow .15s;
    }
    .a-btn:active { transform: scale(.97); }
    .a-btn--stop {
      background: linear-gradient(135deg, var(--brand-orange-400), var(--brand-orange-600));
      color: #fff;
      box-shadow: 0 10px 28px rgba(251, 146, 60, 0.38);
    }
    .a-btn--done {
      background: #fff;
      color: var(--color-text-primary);
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      text-decoration: none;
    }

    @media (max-width: 820px) {
      .b-text { font-size: 20px; padding: 14px 18px; }
      .listen-status { font-size: 22px; }
      .actions { grid-template-columns: 1fr; }
      .a-btn { height: 76px; font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="app">

    <header class="p-header p-header--nav">
      <a href="p01-today.html" class="p-back" aria-label="뒤로">
        <iconify-icon icon="fluent:chevron-left-24-filled" width="28" aria-hidden="true"></iconify-icon>
        뒤로
      </a>
      <nav class="top-nav" aria-label="주요 메뉴">
        <a class="nav-tab nav-tab--active" href="p01-today.html" aria-current="page">
          <iconify-icon icon="fluent:home-24-filled" width="22" aria-hidden="true"></iconify-icon>
          홈
        </a>
        <a class="nav-tab" href="p02-med-alert.html">
          <iconify-icon icon="fluent:clipboard-bullet-list-ltr-24-filled" width="22" aria-hidden="true"></iconify-icon>
          할일
        </a>
        <a class="nav-tab" href="p03-call.html">
          <iconify-icon icon="fluent:people-24-filled" width="22" aria-hidden="true"></iconify-icon>
          가족
        </a>
        <a class="nav-tab" href="p08-help.html">
          <iconify-icon icon="fluent:hand-wave-24-filled" width="22" aria-hidden="true"></iconify-icon>
          도움
        </a>
      </nav>
      <div aria-hidden="true"></div>
    </header>

    <div class="main">

      <!-- 최근 대화 — 말벗 한 마디, 어르신 한 마디 -->
      <section class="convo glass" aria-label="말벗과의 대화">

        <div class="bubble bubble--ai">
          <div class="b-avatar" aria-label="하루안부">
            <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <g transform="translate(50, 50) scale(0.163)">
                <path d="M2521.32 2506.66C1239.65 2657.48 1239.65 1895.6 1239.65 1279.34L2497.69 0.000170058C2518.68 494.198 2522.27 1157.92 1658.86 1262.48C2641.88 1314.25 2521.32 2101.84 2521.32 2506.66Z" fill="#FFFFFF"/>
                <path d="M4.6772 19.3353C1286.35 -131.481 1286.35 630.399 1286.35 1246.66L28.3145 2526C7.32194 2031.8 3.73014 1368.08 867.143 1263.52C-115.881 1211.75 4.6772 424.157 4.6772 19.3353Z" fill="#FFFFFF"/>
              </g>
            </svg>
          </div>
          <div class="b-content">
            <div class="b-who">하루안부</div>
            <div class="b-text">오후엔 뭐 하셨어요? 창문으로 햇살 따뜻하게 들어오지요.</div>
          </div>
        </div>

        <div class="bubble bubble--user">
          <div class="b-avatar b-avatar--user" aria-hidden="true">
            <img src="https://randomuser.me/api/portraits/women/79.jpg" alt="">
          </div>
          <div class="b-content">
            <div class="b-who">지금 말씀하시는 중</div>
            <div class="b-text b-text--live">그럼, 햇살이 참 좋아서 베란다에 나갔다가</div>
          </div>
        </div>

      </section>

      <!-- 듣는 중 히어로 -->
      <div class="listening" aria-live="polite">
        <div class="wave" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="listen-status">잘 듣고 있어요</div>
        <div class="listen-hint">천천히 말씀하셔도 돼요. 다 마치셨으면 아래 버튼을 눌러 주세요.</div>
      </div>

      <!-- 액션 -->
      <div class="actions">
        <a href="p01-today.html" class="a-btn a-btn--done" aria-label="대화 마치기">
          <iconify-icon icon="fluent:checkmark-circle-24-filled" width="28" aria-hidden="true"></iconify-icon>
          대화 마치기
        </a>
        <button class="a-btn a-btn--stop" type="button" aria-label="그만 말하기 — AI에게 답변 요청">
          <iconify-icon icon="fluent:mic-off-24-filled" width="28" aria-hidden="true"></iconify-icon>
          그만 말하기
        </button>
      </div>

    </div>
  </div>

</body>
</html>
