<!DOCTYPE html>
<html lang="ko" data-role="nurse">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 내 정보</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    body {
      background: var(--bg);
      max-width: 430px; padding-top:72px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 108px;
    }
    .content { padding: 0 var(--space-lg); }

    /* --- 그라데이션 프로필 카드 --- */
    .profile-card {
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 65%, #064E3B));
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      color: white;
      box-shadow: 0 8px 28px rgba(5, 150, 105, 0.3);
      position: relative;
      overflow: hidden;
      margin-top: var(--space-xl);
      margin-bottom: var(--space-xl);
    }
    .profile-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .profile-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 15%;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .profile-card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }
    .profile-avatar-wrap {
      position: relative;
      width: 64px; height: 64px;
      flex-shrink: 0;
    }
    .profile-avatar {
      width: 64px; height: 64px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      border: 2.5px solid rgba(255,255,255,0.4);
    }
    .profile-info {
      flex: 1;
    }
    .profile-name {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      color: white;
      margin-bottom: 2px;
    }
    .profile-role {
      font-size: var(--text-callout);
      color: white;
      opacity: 0.8;
      margin-bottom: var(--space-sm);
    }
    .profile-shift {
      display: inline-flex; align-items: center; gap: var(--space-xs);
      padding: 4px var(--space-md);
      background: rgba(255,255,255,0.2);
      color: white;
      border-radius: var(--radius-full);
      font-size: var(--text-mini);
      font-weight: var(--weight-semibold);
    }

    /* 통계 요약 */
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }
    .stat-item {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .stat-value {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      color: var(--primary);
    }
    .stat-label {
      font-size: var(--text-mini);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .menu-group {
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-lg);
    }
    .menu-group-title {
      font-size: var(--text-mini);
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: var(--space-lg) var(--space-lg) var(--space-sm);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      min-height: var(--row-height);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .menu-item:active {
      background: var(--bg);
    }
    .menu-item + .menu-item {
      border-top: 0.5px solid var(--divider);
    }
    .menu-item-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-item-icon--blue { background: #E8F0FE; color: var(--info); }
    .menu-item-icon--green { background: #E8F8ED; color: var(--success); }
    .menu-item-icon--orange { background: #FFF3E0; color: var(--warning); }
    .menu-item-icon--purple { background: #F3E5F5; color: #a855f7; }
    .menu-item-text { flex: 1; }
    .menu-item-label {
      font-size: var(--text-headline);
    }
    .menu-item-desc {
      font-size: var(--text-mini);
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .menu-item-chevron {
      color: var(--text-tertiary);
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .logout-btn {
      display: block;
      width: 100%;
      padding: var(--space-md);
      text-align: center;
      font-size: var(--text-callout);
      color: var(--critical);
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .logout-btn:active {
      background: var(--bg);
    }

    /* --- Toast --- */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: var(--space-sm) var(--space-xl);
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999;
      max-width: 300px;
      text-align: center;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>  <div class="content">
    <!-- 프로필 카드 (그라데이션) -->
    <div class="profile-card">
      <div class="profile-card-inner">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">
            <i data-lucide="user" style="width:28px;height:28px;color:white;"></i>
          </div>
        </div>
        <div class="profile-info">
          <h1 class="profile-name">김미영</h1>
          <p class="profile-role">간호사 · 3층 담당</p>
          <span class="profile-shift"><i data-lucide="clock" style="width:14px;height:14px;"></i> 오전 근무 · 07:00–15:00</span>
          <span class="profile-shift" style="margin-top:6px;"><i data-lucide="award" style="width:14px;height:14px;"></i> 정간호사 · 5년 경력</span>
        </div>
      </div>
    </div>

    <!-- 통계 -->
    <div class="stats-summary">
      <div class="stat-item">
        <div class="stat-value">15</div>
        <div class="stat-label">담당 환자</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">73%</div>
        <div class="stat-label">오늘 완료율</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">2건</div>
        <div class="stat-label">잔여 업무</div>
      </div>
    </div>

    <!-- 메뉴 그룹 1: 근무 -->
    <div class="menu-group-title">근무</div>
    <div class="menu-group">
      <div class="menu-item" onclick="showToast('근무 일정 페이지로 이동합니다')">
        <div class="menu-item-icon menu-item-icon--blue"><i data-lucide="calendar" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">근무 일정</div>
          <div class="menu-item-desc">이번 주 일정 확인</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
      <a href="n06-handoff.html" class="menu-item" style="text-decoration:none;color:inherit;">
        <div class="menu-item-icon menu-item-icon--green"><i data-lucide="clipboard-list" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">인수인계 기록</div>
          <div class="menu-item-desc">최근 기록 보기</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </a>
      <div class="menu-item" onclick="showToast('업무 통계 페이지로 이동합니다')">
        <div class="menu-item-icon menu-item-icon--purple"><i data-lucide="bar-chart" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">업무 통계</div>
          <div class="menu-item-desc">주간/월간 리포트</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
    </div>

    <!-- 메뉴 그룹 2: 계정 -->
    <div class="menu-group-title">계정</div>
    <div class="menu-group">
      <div class="menu-item" onclick="showToast('프로필 수정 페이지로 이동합니다')">
        <div class="menu-item-icon menu-item-icon--blue"><i data-lucide="user-cog" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">프로필 수정</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
      <div class="menu-item" onclick="showToast('알림 설정 페이지로 이동합니다')">
        <div class="menu-item-icon menu-item-icon--orange"><i data-lucide="bell" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">알림 설정</div>
          <div class="menu-item-desc">긴급 알림, SOS, 인수인계</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
    </div>

    <!-- 기타 -->
    <div class="menu-group-title">기타</div>
    <div class="menu-group">
      <div class="menu-item" onclick="showToast('도움말 페이지로 이동합니다')">
        <div class="menu-item-icon menu-item-icon--blue"><i data-lucide="help-circle" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">도움말</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
      <div class="menu-item" onclick="showToast('하루안부 v1.0.0')">
        <div class="menu-item-icon menu-item-icon--blue"><i data-lucide="info" style="width:18px;height:18px;"></i></div>
        <div class="menu-item-text">
          <div class="menu-item-label">앱 정보</div>
          <div class="menu-item-desc">버전 1.0.0</div>
        </div>
        <span class="menu-item-chevron"><i data-lucide="chevron-right" style="width:16px;height:16px;color:var(--text-tertiary);"></i></span>
      </div>
    </div>

    <a href="#" class="logout-btn" onclick="event.preventDefault(); showToast('로그아웃 되었습니다')">로그아웃</a>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <nav class="tabbar" role="navigation" aria-label="메인 내비게이션" style="position:fixed; bottom:0; left:50%; transform:translateX(-50%); max-width:430px; width:100%; height:calc(50px + 44px + 8px); padding-bottom:44px;">
    <a href="n01-dashboard.html" class="tab">
      <span class="tab-icon"><i data-lucide="home"></i></span>
      <span class="tab-label">홈</span>
    </a>
    <a href="n02-patients.html" class="tab">
      <span class="tab-icon"><i data-lucide="users"></i></span>
      <span class="tab-label">환자</span>
    </a>
    <a href="n03-checklist.html" class="tab">
      <span class="tab-icon"><i data-lucide="list-checks"></i></span>
      <span class="tab-label">체크리스트</span>
    </a>
    <a href="n04-mypage.html" class="tab active" aria-current="page">
      <span class="tab-icon"><i data-lucide="user"></i></span>
      <span class="tab-label">내 정보</span>
    </a>
  </nav>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
<div class="ios-home-indicator"></div>
</body>
</html>
