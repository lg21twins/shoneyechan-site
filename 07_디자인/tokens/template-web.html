<!doctype html>
<!--
  ================================================================
  하루안부 · 데스크톱 웹 스켈레톤 v1.0
  ================================================================
  사이드바(240px) + 상단바(64px) + 콘텐츠(max 1280px) 레이아웃.
  의료진 웹 대시보드 / 요양보호사 관리 페이지 등에 사용.

  data-role     : medical | doctor | nurse | caregiver | guardian
  data-platform : web (고정)

  모바일 PWA가 필요하면 template.html을 쓸 것.
  ================================================================
-->
<html lang="ko" data-role="medical" data-platform="web">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>하루안부 · 의료진 웹</title>

  <link rel="icon" type="image/svg+xml" href="../logo/brand-system/01_심볼단독.svg">
  <link rel="apple-touch-icon" href="../logo/brand-system/01_심볼단독.svg">

  <link rel="stylesheet" href="./tokens.css">
  <script src="../_iconify-icon.min.js"></script>

  <style>
    /* ------- 레이아웃 루트 ----------------------------------------- */
    body {
      background: var(--color-bg-canvas);
      color: var(--color-text-primary);
      min-height: 100dvh;
      display: grid;
      grid-template-columns: var(--size-sidebar-width) 1fr;
      grid-template-rows: var(--size-topbar-height) 1fr;
      grid-template-areas:
        "sidebar topbar"
        "sidebar main";
    }

    /* ------- 사이드바 --------------------------------------------- */
    .sidebar {
      grid-area: sidebar;
      background: var(--color-bg-surface);
      border-right: 1px solid var(--color-border-subtle);
      padding: var(--space-inset-loose) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-stack-loose);
      position: sticky;
      top: 0;
      height: 100dvh;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font: var(--weight-bold) var(--text-headline) / 1 var(--font-family-base);
      color: var(--color-text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .sidebar-brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .sidebar-brand-mark img { width: 100%; height: 100%; display: block; }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      height: var(--size-row-compact);
      padding: 0 var(--space-4);
      border-radius: var(--radius-button);
      color: var(--color-text-secondary);
      font: var(--weight-medium) var(--text-callout) / 1 var(--font-family-base);
      text-decoration: none;
    }
    .sidebar-item:hover {
      background: var(--color-bg-surface-muted);
      color: var(--color-text-primary);
    }
    .sidebar-item.is-active {
      background: var(--color-accent-soft);
      color: var(--color-accent-strong);
    }
    .sidebar-item iconify-icon { font-size: var(--size-icon-md); }

    /* ------- 상단바 ----------------------------------------------- */
    .topbar {
      grid-area: topbar;
      height: var(--size-topbar-height);
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-subtle);
      padding: 0 var(--space-page-margin);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }
    .topbar-title {
      font: var(--weight-semibold) var(--text-headline) / 1 var(--font-family-base);
      margin: 0;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .topbar-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-button);
      display: grid;
      place-items: center;
      color: var(--color-text-secondary);
      cursor: pointer;
      background: none;
      border: 0;
    }
    .topbar-icon-btn:hover {
      background: var(--color-bg-surface-muted);
      color: var(--color-text-primary);
    }
    .topbar-avatar {
      width: var(--size-avatar-md);
      height: var(--size-avatar-md);
      border-radius: var(--radius-full);
      background: var(--color-accent-soft);
      color: var(--color-accent-strong);
      display: grid;
      place-items: center;
      font: var(--weight-semibold) var(--text-callout) / 1 var(--font-family-base);
    }

    /* ------- 메인 콘텐츠 ------------------------------------------ */
    .main {
      grid-area: main;
      padding: var(--space-inset-loose) var(--space-page-margin);
      overflow-y: auto;
    }
    .main-inner {
      max-width: var(--size-content-max);
      margin: 0 auto;
      display: grid;
      gap: var(--space-stack-loose);
    }

    /* ------- 카드 ------------------------------------------------- */
    .card {
      background: var(--card-bg);
      border: var(--card-border);
      border-radius: var(--card-radius);
      padding: var(--card-padding);
      box-shadow: var(--card-shadow);
    }
    .card-title {
      font: var(--weight-semibold) var(--text-headline) / 1.3 var(--font-family-base);
      margin: 0 0 var(--space-stack-default);
    }

    /* ------- CTA -------------------------------------------------- */
    .btn {
      height: var(--size-button-default);
      padding: 0 var(--space-inset-loose);
      border-radius: var(--radius-button);
      background: var(--color-accent);
      color: var(--color-accent-on);
      font: var(--weight-semibold) var(--text-body) / 1 var(--font-family-base);
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn:hover { background: var(--color-accent-strong); }
    .btn-soft {
      background: var(--color-accent-soft);
      color: var(--color-accent-strong);
    }
    .btn-soft:hover { background: var(--color-accent-soft); opacity: 0.85; }

    /* ------- 반응형: 좁은 화면에선 사이드바 수축 ------------------ */
    @media (max-width: 960px) {
      body {
        grid-template-columns: 72px 1fr;
      }
      .sidebar { padding: var(--space-inset-loose) var(--space-3); align-items: center; }
      .sidebar-item span:not(.sidebar-item-icon) { display: none; }
      .sidebar-brand span { display: none; }
    }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <aside class="sidebar">
    <a href="#" class="sidebar-brand" aria-label="하루안부 홈">
      <span class="sidebar-brand-mark">
        <img src="../logo/brand-system/01_심볼단독.svg" alt="">
      </span>
      <span>하루안부</span>
    </a>

    <nav class="sidebar-nav">
      <a class="sidebar-item is-active" href="#">
        <iconify-icon icon="fluent:home-24-filled"></iconify-icon>
        <span>대시보드</span>
      </a>
      <a class="sidebar-item" href="#">
        <iconify-icon icon="fluent:people-24-filled"></iconify-icon>
        <span>환자 목록</span>
      </a>
      <a class="sidebar-item" href="#">
        <iconify-icon icon="fluent:clipboard-pulse-24-filled"></iconify-icon>
        <span>케어 기록</span>
      </a>
      <a class="sidebar-item" href="#">
        <iconify-icon icon="fluent:chat-24-filled"></iconify-icon>
        <span>소통</span>
      </a>
      <a class="sidebar-item" href="#">
        <iconify-icon icon="fluent:settings-24-filled"></iconify-icon>
        <span>설정</span>
      </a>
    </nav>
  </aside>

  <!-- 상단바 -->
  <header class="topbar">
    <h1 class="topbar-title">대시보드</h1>
    <div class="topbar-actions">
      <button class="topbar-icon-btn" aria-label="알림">
        <iconify-icon icon="fluent:alert-24-filled"></iconify-icon>
      </button>
      <div class="topbar-avatar">이</div>
    </div>
  </header>

  <!-- 메인 -->
  <main class="main">
    <div class="main-inner">

      <section class="card">
        <h2 class="card-title">오늘 할 일</h2>
        <p style="color: var(--color-text-secondary);
                  font: var(--weight-regular) var(--text-body) / 1.5 var(--font-family-base);
                  margin: 0 0 var(--space-stack-default);">
          배정된 환자 12명 · 완료 7 · 남음 5
        </p>
        <div style="display: flex; gap: var(--space-3);">
          <button class="btn">환자 목록 보기</button>
          <button class="btn btn-soft">케어 기록 작성</button>
        </div>
      </section>

    </div>
  </main>

</body>
</html>
