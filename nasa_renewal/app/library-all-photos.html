  <link rel="stylesheet" href="../styles/tokens.css?v=20260521">

  <style>
    /* tokens → styles/tokens.css, 서브페이지 chrome (.page-topbar/.back-btn/.icon-btn/.msi) → styles/subpage-chrome.css. components.css 는 안 씀 (SVG msi 충돌 회피). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    button { border: 0; background: transparent; font: inherit; color: inherit; cursor: pointer; padding: 0; }
    html, body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    .device { width: 100vw; height: 100vh; background: var(--bg-primary); overflow: hidden; position: relative; }
    @media (max-width: 900px) {
      body { padding: 0; background: var(--bg-primary); }
      .device { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
    }
    .scroll {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* .msi / .page-topbar / .back-btn / .icon-btn / .page-topbar-* → styles/subpage-chrome.css */

    /* Stats bar */
    .stats {
      padding: 0 20px 16px;
      display: flex;
      gap: 18px;
      align-items: baseline;
    }
    .stats-num {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: white;
    }
    .stats-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.6px;
      color: var(--text-subtle);
      text-transform: uppercase;
    }

    /* Filter chips */
    .filters {
      display: flex;
      gap: 8px;
      padding: 0 20px 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--bg-card);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.4px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .chip:hover { background: rgba(255,255,255,0.08); }
    .chip.active {
      background: white;
      color: var(--bg-primary);
    }

    /* Date section */
    .date-section { padding: 0 20px 20px; }
    .date-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .date-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: white;
    }
    .date-title .meta {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.4px;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
      margin-left: 8px;
    }
    .date-count {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.4px;
      color: var(--text-subtle);
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background-color: var(--bg-section);
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-xs);
      cursor: pointer;
    }
    .cell.wide {
      grid-column: span 2;
      aspect-ratio: 2 / 1;
    }
    .cell.tall {
      grid-row: span 2;
      aspect-ratio: 1 / 2;
    }

    .bottom-spacer { height: 60px; }
    @keyframes loadBg { from { opacity: 0; } to { opacity: 1; } }
  </style>
  <script src="../pwa-nav.js" defer></script>
</head>

  <script>
    document.querySelectorAll('[data-bg]').forEach(function(el) {
      var bg = el.getAttribute('data-bg');
      if (bg) {
        var img = new Image();
        img.onload = function() {
          el.style.backgroundImage = "url('" + bg + "')";
          el.style.animation = "loadBg 0.4s ease";
        };
        img.src = bg;
      }
    });
  </script>
