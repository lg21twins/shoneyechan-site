<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shonyechan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #0f0f10;
      --fg: #f4f4f5;
      --muted: #8b8b90;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      text-align: center;
      max-width: 520px;
    }
    h1 {
      font-size: clamp(2.4rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    p {
      margin-top: 20px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .tag {
      margin-top: 40px;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main>
    <h1>shoneyechan</h1>
    <p>준비 중입니다. 곧 새로운 소식으로 찾아뵙겠습니다.</p>
    <p class="tag">www.shoneyechan.com</p>
  </main>
</body>
</html>
